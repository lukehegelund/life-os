<!DOCTYPE html>

<head>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>

.menu-title{font-family:'Cinzel Decorative',serif;font-size:clamp(28px,5vw,60px);color:#a8d860;text-shadow:0 0 40px rgba(100,200,50,.5);letter-spacing:4px;text-align:center;line-height:1.2;}
.menu-sub{font-size:clamp(10px,1.4vw,13px);color:#7a9860;letter-spacing:6px;text-transform:uppercase;margin-top:10px;text-align:center;}

.menu-div{width:200px;height:1px;background:linear-gradient(90deg,transparent,#3a6820,transparent);margin:18px auto;}
.start-btn{margin-top:36px;background:linear-gradient(180deg,#3a6818,#1e4008);border:2px solid #6aac30;border-radius:4px;color:#c8f080;font-family:'Cinzel',serif;font-size:18px;font-weight:600;padding:14px 60px;cursor:pointer;letter-spacing:4px;text-transform:uppercase;box-shadow:0 4px 20px rgba(80,160,40,.3),inset 0 1px 0 rgba(160,255,80,.2);transition:all .2s;}
.start-btn:hover{background:linear-gradient(180deg,#4a8020,#2a5010);transform:translateY(-1px);box-shadow:0 4px 30px rgba(80,160,40,.5);}
#top-bar{position:fixed;top:0;left:0;right:0;height:52px;background:linear-gradient(180deg,#111e0e,#0e180a);border-bottom:2px solid #3a6820;display:none;align-items:center;padding:0 16px;gap:12px;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.6);}
.empire-name{font-size:14px;font-weight:700;color:#a8d860;letter-spacing:3px;text-transform:uppercase;}

.rpill .i{font-size:14px;}.rpill .v{color:#a8d860;font-weight:700;font-size:13px;}.rpill .l{color:#5a7840;font-size:10px;font-family:sans-serif;letter-spacing:1px;}
.spacer{flex:1;}
.turn-btn{background:linear-gradient(180deg,#3a6818,#1e4008);border:1px solid #6aac30;border-radius:4px;color:#c8f080;font-family:'Cinzel',serif;font-size:12px;padding:7px 18px;cursor:pointer;letter-spacing:2px;transition:all .15s;}

#bot-panel{position:fixed;bottom:0;left:0;right:0;height:110px;background:linear-gradient(0deg,#0c1408,#0e180a);border-top:2px solid #2a4818;display:none;align-items:center;padding:0 20px;gap:16px;z-index:100;}
#unit-name{font-size:15px;font-weight:700;color:#a8d860;letter-spacing:2px;margin-bottom:4px;}

.abtn:hover{background:linear-gradient(180deg,#3a4530,#2a3220);border-color:#6aac50;}

</style>
</head>
<body>
<div id="game-container"></div>
<div id="menu-overlay">
  <div>
    <div class="menu-title">LifeOS<br>Empire</div>
    <div class="menu-div"></div>
    <div class="menu-sub">Phaser Isometric</div>
    <div class="menu-tag">2.5D Polytopia-Style</div>
  </div>
  <button class="start-btn" onclick="startGame()">Begin</button>
</div>
<div id="top-bar">
  <span class="empire-name">⚔ Empire</span>
  <div class="rpill"><span class="i">🍎</span><span class="v" id="res-food">0</span><span class="l">FOOD</span></div>
  <div class="rpill"><span class="i">⚒</span><span class="v" id="res-prod">0</span><span class="l">PROD</span></div>
  <div class="rpill"><span class="i">💰</span><span class="v" id="res-gold">0</span><span class="l">GOLD</span></div>
  <div class="rpill"><span class="i">📚</span><span class="v" id="res-sci">0</span><span class="l">SCI</span></div>
  <div class="rpill"><span class="i">🎭</span><span class="v" id="res-cult">0</span><span class="l">CULT</span></div>
  <div class="spacer"></div>
  <div class="rpill"><span class="i">🏙</span><span class="v" id="res-cities">0</span><span class="l">CITIES</span></div>
  <span id="turn-info">Turn 1</span>
  <button class="turn-btn" onclick="endTurn()">End Turn ▶</button>
</div>
<div id="tile-tooltip" style="position:fixed;display:none;background:rgba(10,18,8,.96);border:1px solid #4a8030;border-radius:6px;padding:8px 14px;font-family:sans-serif;font-size:12px;color:#c8e890;z-index:200;pointer-events:none;min-width:140px;">
  <div id="tt-title" style="font-weight:700;font-size:13px;margin-bottom:4px;color:#a8d860;"></div>
  <div id="tt-yields" style="display:flex;gap:8px;font-size:11px;margin-bottom:4px;"></div>
  <div id="tt-resource" style="font-size:11px;color:#f0d060;"></div>
</div>
<div id="bot-panel">
  <div style="flex:1"><div id="unit-name">Select a unit</div><div id="unit-desc">Click your settler to begin.</div></div>
  <div id="action-btns"></div>
</div>
<div id="status-msg"></div>

<script>
// ══════════════════════════════════════════════════════
//  ISOMETRIC TILE MATH — true isometric projection
//
//  Classic isometric formula (no stagger, no overlap):
//    screen_x = (col - row) * TW/2
//    screen_y = (col + row) * TH/2
//
//  This places each tile's TOP VERTEX at that position.
//  Adjacent tiles share edges exactly — zero gap, zero overlap.
//
//  The tile canvas stores:
//    • ABOVE px of space above the diamond top vertex (for features)
//    • The diamond itself (TH pixels tall)
//    • DEPTH px of side-face below the bottom vertex (thin edge only)
//
//  Phaser origin = (0.5, ABOVE/TC_H)
//  → placing sprite at isoPos(col,row) pins the top vertex there.
// ══════════════════════════════════════════════════════

const TW     = 128;   // tile diamond width
const TH     = 64;    // tile diamond height  (TW/2 for 2:1 iso)
const DEPTH  = 10;    // side-face depth — thin bottom edge only
const ABOVE  = 48;    // canvas pixels above the diamond top vertex (for features)

// Canvas dimensions for a standard terrain tile
const TC_W   = TW;
const TC_H   = ABOVE + TH + DEPTH;
// Origin fraction so pivot = diamond top vertex
const OX     = 0.5;
const OY     = ABOVE / TC_H;

// Grid steps for true isometric
const STEP_X  = TW / 2;   // (col-row) multiplier
const STEP_Y  = TH / 2;   // (col+row) multiplier

const COLS = 18, ROWS = 11;
const TOP_H = 52, BOT_H = 110;

// ── TERRAIN — Forest Kingdom palette ──
// yields: {f=food, p=production, g=gold, s=science, c=culture}
const TERRAIN = {
  ocean:    {label:'Ocean',    passable:false, top:'#1e4060',lt:'#2c5c88',side:'#102838',dark:'#081820',water:true,  yields:{f:1,p:0,g:1,s:0,c:0}},
  coast:    {label:'Coast',    passable:false, top:'#246080',lt:'#3880a8',side:'#143850',dark:'#0a2030',water:true,  yields:{f:1,p:0,g:2,s:0,c:0}},
  plains:   {label:'Plains',   passable:true,  top:'#7ecf3e',lt:'#98e050',side:'#4a9820',dark:'#2e6010',water:false, yields:{f:1,p:1,g:0,s:0,c:0}},
  grassland:{label:'Grassland',passable:true,  top:'#5cae28',lt:'#78cc3c',side:'#386814',dark:'#20420a',water:false, yields:{f:2,p:0,g:0,s:0,c:0}},
  forest:   {label:'Forest',   passable:true,  top:'#3a8014',lt:'#52a020',side:'#22500a',dark:'#123006',water:false, yields:{f:1,p:1,g:0,s:0,c:0}},
  hill:     {label:'Hills',    passable:true,  top:'#8a7448',lt:'#a89060',side:'#5c4c28',dark:'#3c3018',water:false, yields:{f:0,p:2,g:0,s:0,c:0}},
  mountain: {label:'Mountain', passable:false, top:'#908880',lt:'#b0a898',side:'#585048',dark:'#383028',water:false, yields:{f:0,p:0,g:0,s:0,c:0}},
  desert:   {label:'Desert',   passable:true,  top:'#a8d860',lt:'#c0f070',side:'#688a30',dark:'#405618',water:false, yields:{f:0,p:0,g:0,s:0,c:0}},
  tundra:   {label:'Tundra',   passable:true,  top:'#78a058',lt:'#98c070',side:'#4a6838',dark:'#2e4020',water:false, yields:{f:1,p:0,g:0,s:0,c:0}},
  river:    {label:'River',    passable:true,  top:'#60b830',lt:'#7ad040',side:'#3a7018',dark:'#20480a',water:false, yields:{f:2,p:1,g:1,s:0,c:0}},
  snow:     {label:'Snow',     passable:false, top:'#d8eec8',lt:'#eef8e0',side:'#8ab880',dark:'#609858',water:false, yields:{f:0,p:0,g:0,s:0,c:0}},
};

// ── RESOURCES ──
// Each resource: {label, emoji, type (bonus/luxury/strategic), tileBonus {f,p,g,s}, validOn:[terrain types]}
const RESOURCES = {
  wheat:   {label:'Wheat',   emoji:'🌾', type:'bonus',    bonus:{f:1,p:0,g:0,s:0}, validOn:['plains','grassland','river']},
  deer:    {label:'Deer',    emoji:'🦌', type:'bonus',    bonus:{f:1,p:1,g:0,s:0}, validOn:['forest','tundra']},
  fish:    {label:'Fish',    emoji:'🐟', type:'bonus',    bonus:{f:1,p:0,g:1,s:0}, validOn:['coast','ocean']},
  stone:   {label:'Stone',   emoji:'🪨', type:'bonus',    bonus:{f:0,p:1,g:1,s:0}, validOn:['grassland','plains','hill']},
  gems:    {label:'Gems',    emoji:'💎', type:'luxury',   bonus:{f:0,p:0,g:3,s:0}, validOn:['desert','hill']},
  gold_r:  {label:'Gold',    emoji:'🥇', type:'luxury',   bonus:{f:0,p:0,g:2,s:0}, validOn:['hill','desert','plains']},
  silk:    {label:'Silk',    emoji:'🧵', type:'luxury',   bonus:{f:0,p:0,g:2,s:0}, validOn:['forest']},
  spices:  {label:'Spices',  emoji:'🌶', type:'luxury',   bonus:{f:1,p:0,g:1,s:0}, validOn:['forest','grassland']},
  iron:    {label:'Iron',    emoji:'⚙',  type:'strategic',bonus:{f:0,p:2,g:0,s:0}, validOn:['hill','plains','tundra']},
  horses:  {label:'Horses',  emoji:'🐎', type:'strategic',bonus:{f:1,p:1,g:0,s:0}, validOn:['plains','grassland','tundra']},
  coal:    {label:'Coal',    emoji:'⬛', type:'strategic',bonus:{f:0,p:2,g:0,s:0}, validOn:['hill']},
};

// ── PROCEDURAL MAP GENERATION ──
function generateMap(seed) {
  const rng = seededRng(seed || 42);
  const map = [];
  // Initialize with ocean
  for (let r = 0; r < ROWS; r++) {
    map.push([]);
    for (let c = 0; c < COLS; c++) map[r].push('ocean');
  }

  // Place continent seeds (2 main land masses)
  const seeds = [
    {c: Math.floor(COLS * 0.25), r: Math.floor(ROWS * 0.5)},
    {c: Math.floor(COLS * 0.72), r: Math.floor(ROWS * 0.45)},
  ];

  // Noise-based height map
  const height = [];
  for (let r = 0; r < ROWS; r++) {
    height.push([]);
    for (let c = 0; c < COLS; c++) {
      // Distance from nearest continent seed
      let minD = Infinity;
      for (const s of seeds) {
        const d = Math.sqrt((c-s.c)**2 + (r-s.r)**2);
        minD = Math.min(minD, d);
      }
      const maxD = Math.sqrt(COLS**2 + ROWS**2) * 0.5;
      // Height = inverse distance + noise
      const base = 1 - (minD / maxD);
      const noise = (rng() - 0.5) * 0.4;
      height[r].push(Math.max(0, Math.min(1, base + noise)));
    }
  }

  // Terrain from height
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const h = height[r][c];
      const n = rng();
      if (h < 0.28) {
        map[r][c] = 'ocean';
      } else if (h < 0.38) {
        map[r][c] = 'coast';
      } else if (h > 0.82) {
        // High elevation
        map[r][c] = n < 0.6 ? 'mountain' : 'hill';
      } else if (h > 0.68) {
        // Upper land
        if (n < 0.35) map[r][c] = 'hill';
        else if (n < 0.55) map[r][c] = 'forest';
        else map[r][c] = 'plains';
      } else {
        // Mid land
        const lat = r / ROWS; // 0=top, 1=bottom
        if (lat < 0.15 || lat > 0.88) {
          map[r][c] = n < 0.5 ? 'snow' : 'tundra';
        } else if (lat > 0.55 && lat < 0.80 && n < 0.28) {
          map[r][c] = 'desert';
        } else if (n < 0.32) {
          map[r][c] = 'grassland';
        } else if (n < 0.55) {
          map[r][c] = 'plains';
        } else if (n < 0.70) {
          map[r][c] = 'forest';
        } else {
          map[r][c] = 'tundra';
        }
      }
    }
  }

  // Add rivers (connect hills to coast)
  let riverCount = 0;
  for (let r = 1; r < ROWS-1 && riverCount < 3; r++) {
    for (let c = 1; c < COLS-1 && riverCount < 3; c++) {
      if (map[r][c] === 'plains' && rng() < 0.03) {
        // Carve a short river
        let cr = r, cc = c;
        for (let step = 0; step < 4; step++) {
          if (cr >= 0 && cr < ROWS && cc >= 0 && cc < COLS && map[cr][cc] !== 'ocean' && map[cr][cc] !== 'coast') {
            map[cr][cc] = 'river';
          }
          cr += rng() < 0.5 ? 1 : 0;
          cc += rng() < 0.5 ? 1 : -1;
        }
        riverCount++;
      }
    }
  }

  return map;
}

// ── RESOURCE PLACEMENT ──
function generateResources(mapData, seed) {
  const rng = seededRng((seed || 42) + 7777);
  const resourceMap = {}; // key: "col_row" → resource key

  for (const [resKey, res] of Object.entries(RESOURCES)) {
    // Place 2-4 of each resource type
    const count = 2 + Math.floor(rng() * 3);
    let placed = 0;
    let attempts = 0;
    while (placed < count && attempts < 200) {
      attempts++;
      const c = Math.floor(rng() * COLS);
      const r = Math.floor(rng() * ROWS);
      const key = `${c}_${r}`;
      const tType = mapData[r]?.[c];
      if (tType && res.validOn.includes(tType) && !resourceMap[key]) {
        resourceMap[key] = resKey;
        placed++;
      }
    }
  }
  return resourceMap;
}

// Compute tile yield including resource bonus
function getTileYield(col, row, mapData, resourceMap) {
  const tType = mapData[row]?.[col];
  if (!tType) return {f:0,p:0,g:0,s:0,c:0};
  const base = {...TERRAIN[tType].yields};
  const rKey = resourceMap[`${col}_${row}`];
  if (rKey && RESOURCES[rKey]) {
    const rb = RESOURCES[rKey].bonus;
    base.f += rb.f || 0;
    base.p += rb.p || 0;
    base.g += rb.g || 0;
    base.s += rb.s || 0;
  }
  return base;
}

// Compute empire-wide per-turn income (from all revealed tiles in city ranges)
function computeIncome(mapData, resourceMap, cities) {
  const total = {f:0,p:0,g:0,s:0,c:1}; // base 1 culture
  for (const city of cities) {
    total.g += 2; // base gold per city
    total.s += 1; // base science per city
    total.c += 1; // base culture per city
    // Work surrounding tiles (pop = 1 for now, just the city tile + 2 neighbors)
    const worked = [{col:city.col, row:city.row}];
    for (const n of getNeighbors(city.col, city.row).slice(0, city.pop || 1)) worked.push(n);
    for (const t of worked) {
      const y = getTileYield(t.col, t.row, mapData, resourceMap);
      total.f += y.f; total.p += y.p; total.g += y.g; total.s += y.s; total.c += (y.c||0);
    }
  }
  return total;
}

const MAP_SEED = 42;
const MAP_DATA = generateMap(MAP_SEED);
const RESOURCE_MAP = generateResources(MAP_DATA, MAP_SEED);

// ── ISO POSITION ──
// Returns the screen coordinate of the diamond TOP VERTEX for tile (col,row)
// Using true isometric: x=(col-row)*TW/2,  y=(col+row)*TH/2
// ── WRAP HELPERS ──
// Toroidal world: east wraps to west, north wraps to south
function wrapC(c){return((c%COLS)+COLS)%COLS;}
function wrapR(r){return((r%ROWS)+ROWS)%ROWS;}
// Terrain/resource lookup with wrapping
function terrainAt(c,r){return MAP_DATA[wrapR(r)][wrapC(c)];}
function resourceAt(c,r){return RESOURCE_MAP[`${wrapC(c)}_${wrapR(r)}`]||null;}
// Canonical key (always in 0..COLS-1, 0..ROWS-1)
function tileKey(c,r){return `${wrapC(c)}_${wrapR(r)}`;}

function isoPos(col, row) {
  return {
    x: (col - row) * STEP_X,
    y: (col + row) * STEP_Y,
  };
}

// ── HEX UTILS ──
function hexDist(c1,r1,c2,r2){
  // Use toroidal-aware distance: take shortest path on wrapped grid
  let dc=Math.abs(c1-c2), dr=Math.abs(r1-r2);
  if(dc>COLS/2) dc=COLS-dc;
  if(dr>ROWS/2) dr=ROWS-dr;
  return Math.max(dc,dr);
}
function getNeighbors(col,row){
  // 4 cardinal neighbors, all wrapped
  return [[-1,0],[1,0],[0,-1],[0,1]].map(([dc,dr])=>({col:wrapC(col+dc),row:wrapR(row+dr)}));
}
function getMovable(unit,r=2){const res=[];for(let row=0;row<ROWS;row++)for(let col=0;col<COLS;col++){if(col===unit.col&&row===unit.row)continue;if(hexDist(unit.col,unit.row,col,row)<=r&&TERRAIN[terrainAt(col,row)].passable&&!GS.units.some(u=>u.col===col&&u.row===row))res.push({col,row});}return res;}
function seededRng(s){let n=s;return()=>{n=(n*1664525+1013904223)&0xffffffff;return(n>>>0)/0xffffffff;};}

// ── COLOR UTILS ──
function hexToRgb(h){const n=parseInt(h.slice(1),16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255};}
function lighten(h,a){const c=hexToRgb(h);return`rgb(${Math.min(255,c.r+a)},${Math.min(255,c.g+a)},${Math.min(255,c.b+a)})`;}
function darken(h,a){const c=hexToRgb(h);return`rgb(${Math.max(0,c.r-a)},${Math.max(0,c.g-a)},${Math.max(0,c.b-a)})`;}

// ── GAME STATE ──
const GS={
  turn:1, cities:[], units:[], selectedUnit:null, moveHighlights:[],
  nextCityId:1, nextUnitId:1,
  // Fog of war: set of "col_row" strings that have been revealed
  revealed: new Set(),
  income:{f:0,p:0,g:0,s:0,c:0},
};
const CITY_NAMES=['Aurum','Veridian','Solmere','Caelthon','Rivenmoor','Dunhallow','Ironspire','Thornwall','Eastmarch','Goldenveil'];

// ══════════════════════════════════════════════════════
//  TILE CANVAS BUILDER
//
//  Canvas layout (height = ABOVE + TH + DEPTH):
//
//   y=0       ┌──────────────────┐  ← canvas top
//             │    ABOVE (48px)  │  feature art drawn upward from here
//   y=ABOVE   │        ◆         │  ← diamond TOP VERTEX  ← pivot/origin
//             │       ◆ ◆        │
//   y=A+TH/2  │      ◆   ◆       │  ← left/right tips
//             │       ◆ ◆        │
//   y=A+TH    │        ◆         │  ← diamond BOTTOM VERTEX
//             │  thin depth edge │
//   y=A+TH+D  └──────────────────┘  ← canvas bottom
//
//  Phaser origin: (0.5, ABOVE/TC_H)
//  Placing sprite at isoPos(col,row) pins the top vertex there.
// ══════════════════════════════════════════════════════

function makeTile(type, t, featureFn) {
  const oc = document.createElement('canvas');
  oc.width = TC_W; oc.height = TC_H;
  const ctx = oc.getContext('2d');

  // Diamond vertex positions in canvas space
  const topX = TC_W/2,  topY = ABOVE;
  const midLX = TC_W/2 - TW/2, midY = ABOVE + TH/2;
  const midRX = TC_W/2 + TW/2;
  const botX = TC_W/2,  botY = ABOVE + TH;

  // ── 1. Depth faces (drawn FIRST, behind the top face) ──

  // SE face (right side)
  ctx.beginPath();
  ctx.moveTo(botX, botY);
  ctx.lineTo(midRX, midY);
  ctx.lineTo(midRX, midY + DEPTH);
  ctx.lineTo(botX,  botY + DEPTH);
  ctx.closePath();
  const seG = ctx.createLinearGradient(0, botY, 0, botY+DEPTH);
  seG.addColorStop(0, t.side); seG.addColorStop(1, t.dark);
  ctx.fillStyle = seG; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1; ctx.stroke();

  // SW face (left side, slightly lighter)
  ctx.beginPath();
  ctx.moveTo(botX, botY);
  ctx.lineTo(midLX, midY);
  ctx.lineTo(midLX, midY + DEPTH);
  ctx.lineTo(botX,  botY + DEPTH);
  ctx.closePath();
  const swG = ctx.createLinearGradient(0, botY, 0, botY+DEPTH);
  swG.addColorStop(0, lighten(t.side, 14)); swG.addColorStop(1, lighten(t.dark, 8));
  ctx.fillStyle = swG; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.stroke();

  // ── 2. Top face ──
  ctx.beginPath();
  ctx.moveTo(topX, topY);
  ctx.lineTo(midRX, midY);
  ctx.lineTo(botX,  botY);
  ctx.lineTo(midLX, midY);
  ctx.closePath();

  // Sun from top-left → shadow bottom-right
  const tG = ctx.createLinearGradient(midLX, topY, midRX, botY);
  tG.addColorStop(0,   t.lt);
  tG.addColorStop(0.5, t.top);
  tG.addColorStop(1,   darken(t.top, 22));
  ctx.fillStyle = tG; ctx.fill();

  // ── 3. Terrain features (clipped to top face) ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(topX, topY); ctx.lineTo(midRX, midY);
  ctx.lineTo(botX, botY); ctx.lineTo(midLX, midY);
  ctx.closePath(); ctx.clip();
  if (featureFn) featureFn(ctx, topX, topY, botX, botY, midLX, midRX, midY);
  ctx.restore();

  // ── 4. Edge highlights (rim lighting) ──
  ctx.beginPath(); ctx.moveTo(topX,topY); ctx.lineTo(midLX,midY);
  ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(topX,topY); ctx.lineTo(midRX,midY);
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(midLX,midY); ctx.lineTo(botX,botY); ctx.lineTo(midRX,midY);
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1; ctx.stroke();

  // ── 5. Feature decorations above the tile (in ABOVE zone) ──
  if (featureFn) featureFn(ctx, topX, topY, botX, botY, midLX, midRX, midY, true);

  return oc;
}

// Helper: draw an iso diamond path
function isoDiamond(ctx, cx, topY, tw, th) {
  ctx.beginPath();
  ctx.moveTo(cx, topY);
  ctx.lineTo(cx+tw/2, topY+th/2);
  ctx.lineTo(cx, topY+th);
  ctx.lineTo(cx-tw/2, topY+th/2);
  ctx.closePath();
}

// ── TERRAIN FEATURE FUNCTIONS ──
// All features are drawn relative to the tile canvas coordinate system:
//   tx   = topX = TC_W/2  (horizontal center, same as diamond top vertex x)
//   topY = ABOVE           (diamond top vertex y — feature roots start here)
//   midY = ABOVE + TH/2    (tile visual center y — best anchor for "on ground" features)
//   botY = ABOVE + TH      (diamond bottom vertex y)
//   mlx/mrx = left/right tips of the diamond
//
// "above=true" pass: draw the 3D feature art that rises above the tile surface.
//   Root the art at topY (the top vertex of the diamond surface).
// "above=false" pass: draw ground-level texture inside the clipped diamond.

function featForest(ctx, tx, topY, botX, botY, mlx, mrx, midY, above) {
  if (above) {
    const rng = seededRng(7731);
    // 4 trees rooted at midY (visual ground surface of tile), not topY
    const trees = [{ox:-20,s:14},{ox:18,s:12},{ox:-4,s:16},{ox:26,s:10}];
    for (const {ox,s} of trees) {
      drawFlatTree(ctx, tx+ox, midY, s, rng);
    }
  } else {
    const rng = seededRng(7731);
    for (let i=0;i<8;i++) {
      const x=tx+(rng()-.5)*(mrx-mlx)*.65, y=midY+(rng()-.5)*(botY-midY)*.65;
      ctx.fillStyle=`rgba(15,50,15,${0.12+rng()*0.12})`;
      ctx.beginPath(); ctx.ellipse(x,y,6+rng()*4,3+rng()*2,0,0,Math.PI*2); ctx.fill();
    }
  }
}

function featMountain(ctx, tx, topY, botX, botY, mlx, mrx, midY, above) {
  if (!above) return;
  // Two mountains rooted at midY (visual ground), not topY
  drawFlatMountain(ctx, tx-10, midY, 26, 36);
  drawFlatMountain(ctx, tx+14, midY+4, 18, 26);
}

function featHill(ctx, tx, topY, botX, botY, mlx, mrx, midY, above) {
  if (!above) {
    // Subtle hill bumps on ground surface
    for (let i=0;i<2;i++) {
      const hx=tx+(i===0?-14:14), hy=midY+4;
      ctx.fillStyle=lighten('#988654',18);
      ctx.beginPath(); ctx.ellipse(hx,hy,14,7,0,Math.PI,0); ctx.fill();
      ctx.fillStyle='#988654';
      ctx.beginPath(); ctx.ellipse(hx,hy,8,4,0,Math.PI,0); ctx.fill();
    }
  }
}

function featDesert(ctx, tx, topY, botX, botY, mlx, mrx, midY, above) {
  if (!above) {
    const rng=seededRng(4421);
    for (let i=0;i<3;i++) {
      const dy=midY+2+i*7+(rng()-.5)*2;
      ctx.beginPath();
      ctx.moveTo(mlx+8, dy);
      ctx.bezierCurveTo(tx-TW*.08,dy-4, tx+TW*.08,dy-1, mrx-8,dy-3);
      ctx.strokeStyle=`rgba(190,145,30,${0.18+i*0.06})`; ctx.lineWidth=1+i*.25; ctx.stroke();
    }
  }
}

function featRiver(ctx, tx, topY, botX, botY, mlx, mrx, midY, above) {
  if (!above) {
    ctx.strokeStyle='rgba(45,110,200,0.7)'; ctx.lineWidth=8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(mlx+6,midY+2); ctx.bezierCurveTo(tx-TW*.08,midY-3,tx+TW*.08,midY+5,mrx-6,midY+1); ctx.stroke();
    ctx.strokeStyle='rgba(120,190,255,0.45)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(mlx+8,midY+1); ctx.bezierCurveTo(tx-TW*.08,midY-4,tx+TW*.08,midY+4,mrx-8,midY); ctx.stroke();
  }
}

function featGrass(ctx, tx, topY, botX, botY, mlx, mrx, midY, above) {
  if (!above) {
    const rng=seededRng(1199);
    for (let i=0;i<10;i++) {
      const gx=tx+(rng()-.5)*(mrx-mlx)*.68, gy=midY+3+rng()*(botY-midY)*.65;
      const h=5+rng()*6, lean=(rng()-.5)*4;
      ctx.strokeStyle=`rgba(50,140,20,${0.55+rng()*.3})`; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(gx,gy); ctx.quadraticCurveTo(gx+lean,gy-h*.6,gx+lean*.6,gy-h); ctx.stroke();
    }
  }
}

function featSnow(ctx, tx, topY, botX, botY, mlx, mrx, midY, above) {
  if (!above) {
    const rng=seededRng(9902);
    for (let i=0;i<4;i++) {
      const sx=tx+(rng()-.5)*(mrx-mlx)*.6, sy=midY+3+rng()*(botY-midY)*.55;
      const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,12+rng()*8);
      sg.addColorStop(0,'rgba(255,255,255,0.6)'); sg.addColorStop(1,'rgba(210,235,255,0)');
      ctx.fillStyle=sg; ctx.beginPath(); ctx.ellipse(sx,sy,16+rng()*7,6+rng()*4,0,0,Math.PI*2); ctx.fill();
    }
  }
}

function featTundra(ctx, tx, topY, botX, botY, mlx, mrx, midY, above) {
  if (!above) {
    const rng=seededRng(3318);
    for (let i=0;i<5;i++) {
      const px=tx+(rng()-.5)*(mrx-mlx)*.6, py=midY+3+rng()*(botY-midY)*.55;
      ctx.fillStyle=`rgba(100,130,110,${0.28+rng()*.22})`;
      ctx.beginPath(); ctx.ellipse(px,py,7+rng()*4,3+rng()*2,rng()*Math.PI,0,Math.PI*2); ctx.fill();
    }
  }
}

function featWater(ctx, tx, topY, botX, botY, mlx, mrx, midY, above) {
  if (!above) {
    for (let i=0;i<3;i++) {
      const wy = midY+2+i*7;
      ctx.strokeStyle=`rgba(140,210,255,${0.14+i*.05})`; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(mlx+8,wy); ctx.bezierCurveTo(tx-TW*.06,wy-4,tx+TW*.06,wy+1,mrx-8,wy-2); ctx.stroke();
    }
  }
}

// ── FEATURE PRIMITIVES ──
function drawFlatTree(ctx, cx, baseY, s, rng) {
  // Forest Kingdom pine — darker, richer greens, warm brown trunk
  const trunkH = s*0.38, trunkW = s*0.13;
  ctx.fillStyle = '#5a3010';
  ctx.fillRect(cx-trunkW/2, baseY-trunkH, trunkW, trunkH+2);
  // Highlight one side of trunk
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.fillRect(cx-trunkW/2, baseY-trunkH, trunkW*0.4, trunkH);
  // Three layered pine cones — earthy forest greens
  const layers = [
    {y: baseY-trunkH-s*.28, r: s*.52, col:'#2a6812'},
    {y: baseY-trunkH-s*.60, r: s*.38, col:'#3a8018'},
    {y: baseY-trunkH-s*.86, r: s*.24, col:'#4a9a20'},
  ];
  for (const l of layers) {
    // Drop shadow under each layer
    ctx.fillStyle='rgba(0,0,0,0.20)';
    ctx.beginPath(); ctx.ellipse(cx+s*.08, l.y+l.r*.20+2, l.r*.62, l.r*.18, 0, 0, Math.PI*2); ctx.fill();
    // Main triangle
    ctx.fillStyle = l.col;
    ctx.beginPath(); ctx.moveTo(cx, l.y); ctx.lineTo(cx-l.r, l.y+l.r*.84); ctx.lineTo(cx+l.r, l.y+l.r*.84); ctx.closePath(); ctx.fill();
    // Lit left face
    ctx.fillStyle = lighten(l.col, 22);
    ctx.beginPath(); ctx.moveTo(cx, l.y); ctx.lineTo(cx-l.r, l.y+l.r*.84); ctx.lineTo(cx-l.r*.12, l.y+l.r*.84); ctx.closePath(); ctx.fill();
    // Dark right face
    ctx.fillStyle = darken(l.col, 16);
    ctx.beginPath(); ctx.moveTo(cx, l.y); ctx.lineTo(cx+l.r*.12, l.y+l.r*.84); ctx.lineTo(cx+l.r, l.y+l.r*.84); ctx.closePath(); ctx.fill();
  }
}

function drawFlatMountain(ctx, cx, baseY, w, h) {
  // Forest Kingdom mountain — warm gray stone, deep shadow, snow cap + pine
  // Drop shadow
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.moveTo(cx,baseY-h); ctx.lineTo(cx-w*.62,baseY+5); ctx.lineTo(cx+w*.62,baseY+5); ctx.closePath(); ctx.fill();
  // Lit left face
  ctx.fillStyle='#948c88';
  ctx.beginPath(); ctx.moveTo(cx,baseY-h); ctx.lineTo(cx-w*.55,baseY+4); ctx.lineTo(cx+w*.55,baseY+4); ctx.closePath(); ctx.fill();
  // Dark right face
  ctx.fillStyle='rgba(0,0,0,0.20)';
  ctx.beginPath(); ctx.moveTo(cx,baseY-h); ctx.lineTo(cx,baseY+4); ctx.lineTo(cx+w*.55,baseY+4); ctx.closePath(); ctx.fill();
  // Snow cap
  ctx.fillStyle='#eef4f0';
  ctx.beginPath(); ctx.moveTo(cx,baseY-h); ctx.lineTo(cx-w*.20,baseY-h+h*.32); ctx.lineTo(cx+w*.22,baseY-h+h*.32); ctx.closePath(); ctx.fill();
  // Snow highlight
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.moveTo(cx,baseY-h); ctx.lineTo(cx-w*.18,baseY-h+h*.28); ctx.lineTo(cx-w*.04,baseY-h+h*.28); ctx.closePath(); ctx.fill();
  // Small pine tree on slope (Forest Kingdom signature detail)
  if(w > 16) {
    const px = cx - w*.40, py = baseY + 2;
    ctx.fillStyle='#2a6812';
    ctx.beginPath(); ctx.moveTo(px,py-9); ctx.lineTo(px-5,py+2); ctx.lineTo(px+5,py+2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.beginPath(); ctx.moveTo(px,py-9); ctx.lineTo(px-5,py+2); ctx.lineTo(px-1,py+2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#5a3010';
    ctx.fillRect(px-1, py+2, 2, 3);
  }
}

// ── TILE FEATURE MAP ──
const FEAT_MAP = {
  forest:    featForest,
  mountain:  featMountain,
  hill:      featHill,
  desert:    featDesert,
  river:     featRiver,
  plains:    featGrass,
  grassland: featGrass,
  snow:      featSnow,
  tundra:    featTundra,
  ocean:     featWater,
  coast:     featWater,
};

// ══════════════════════════════════════════════════════
//  SETTLER SPRITE
//
//  Design: Polytopia-style.
//  Body = isometric CUBE: top face + left wall + right wall.
//  Head = big circle. Hat = clean centered triangle.
//  Flat colors, minimal detail. No fussy curves.
//
//  Canvas: 96 × 128.  Anchor: (0.5, 1.0) at foot point.
// ══════════════════════════════════════════════════════
function makeSettler(selected) {
  // Draw internally at 96×128, then scale down to 60×80 via ctx.scale
  const SCALE = 0.625;
  const W=60, H=80;
  const oc=document.createElement('canvas'); oc.width=W; oc.height=H;
  const ctx=oc.getContext('2d');
  ctx.scale(SCALE, SCALE);
  const cx=48; // internal horizontal center (96/2)

  // Ground point (feet) — internal coords
  const gY = 122;

  // ── Shadow ──
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(cx+2, gY, 16, 5, 0, 0, Math.PI*2); ctx.fill();

  // ── Legs / boots ──
  const bootCol='#2a1a0a';
  // Left boot (lit side)
  fillRR(ctx, cx-13, gY-18, 11, 14, 3, '#3e2a12');
  // Right boot (shadow side)
  fillRR(ctx, cx+2,  gY-18, 11, 14, 3, bootCol);
  // Toe highlights
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(cx-12, gY-18, 5, 3);

  // ── ISOMETRIC CUBE BODY ── Forest Kingdom tunic: warm earthy browns
  //  Viewed from the front-right in isometric:
  //    top face  : horizontal parallelogram at the top
  //    left face : lit vertical rectangle (viewer left)
  //    right face: dark vertical rectangle (viewer right)
  //
  //  Cube is 30 wide, 22 tall (each half-face = 15 wide).
  //  Top face is a flat diamond/parallelogram 4px tall.
  //
  const cTop  = selected ? '#d09040' : '#a86c2c';
  const cLit  = selected ? '#e0a850' : '#c08038';
  const cDark = selected ? '#a87020' : '#7a4c1a';

  const bTop  = gY - 72;   // top of the body cube
  const bBot  = gY - 20;   // bottom of cube (sits on legs)
  const bH    = bBot - bTop;   // height of side faces
  const bHalf = 22;            // half-width of cube at its widest
  const tSkew = 6;             // how many px the top face parallelogram is offset

  // Left face (lit) — simple rectangle
  ctx.fillStyle=cLit;
  ctx.beginPath();
  ctx.moveTo(cx - bHalf, bTop + tSkew);
  ctx.lineTo(cx,          bTop);
  ctx.lineTo(cx,          bBot);
  ctx.lineTo(cx - bHalf,  bBot + tSkew);
  ctx.closePath(); ctx.fill();

  // Right face (dark)
  ctx.fillStyle=cDark;
  ctx.beginPath();
  ctx.moveTo(cx,          bTop);
  ctx.lineTo(cx + bHalf,  bTop + tSkew);
  ctx.lineTo(cx + bHalf,  bBot + tSkew);
  ctx.lineTo(cx,          bBot);
  ctx.closePath(); ctx.fill();

  // Top face (slightly lighter, flat parallelogram)
  ctx.fillStyle=cTop;
  ctx.beginPath();
  ctx.moveTo(cx - bHalf, bTop + tSkew);
  ctx.lineTo(cx,          bTop);
  ctx.lineTo(cx + bHalf,  bTop + tSkew);
  ctx.lineTo(cx,          bTop + tSkew * 2);
  ctx.closePath(); ctx.fill();

  // Edge lines to sharpen the cube
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=1;
  // Vertical center edge
  ctx.beginPath(); ctx.moveTo(cx, bTop); ctx.lineTo(cx, bBot); ctx.stroke();
  // Top ridge
  ctx.beginPath();
  ctx.moveTo(cx - bHalf, bTop + tSkew);
  ctx.lineTo(cx, bTop);
  ctx.lineTo(cx + bHalf, bTop + tSkew);
  ctx.stroke();

  // ── Belt: thin band at cube midpoint ── Forest: dark leather + gold buckle
  const beltY = bTop + bH * 0.55;
  ctx.fillStyle='#4a2c0e'; ctx.fillRect(cx - bHalf, beltY, bHalf * 2, 5);
  // Belt seam on the right (darker)
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(cx, beltY, bHalf, 5);
  // Buckle — gold
  fillRR(ctx, cx - 5, beltY - 1, 10, 7, 2, '#c89020');
  ctx.strokeStyle='#8a6010'; ctx.lineWidth=1; ctx.strokeRect(cx-5, beltY-1, 10, 7);

  // ── Neck — Forest settler skin tone ──
  ctx.fillStyle='#d4a262'; ctx.fillRect(cx - 4, bTop - 8, 8, 10);

  // ── Head: big clean circle ──
  const headY = bTop - 20;   // center of head
  const headR = 16;
  // Drop shadow
  ctx.fillStyle='rgba(0,0,0,0.14)';
  ctx.beginPath(); ctx.arc(cx + 2, headY + 2, headR, 0, Math.PI*2); ctx.fill();
  // Face base — warm skin
  ctx.fillStyle='#d4a262';
  ctx.beginPath(); ctx.arc(cx, headY, headR, 0, Math.PI*2); ctx.fill();
  // Lit top-left highlight
  ctx.fillStyle='#e8b87a';
  ctx.beginPath(); ctx.arc(cx - 4, headY - 4, 10, 0, Math.PI*2); ctx.fill();
  // Soft specular
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.beginPath(); ctx.arc(cx - 6, headY - 7, 5, 0, Math.PI*2); ctx.fill();

  // ── HAT: clean centered triangle — Forest Kingdom hood (earthy brown) ──
  //  Base sits across the top of the head; tip points straight up.
  const hoodCol = selected ? '#8a5a2a' : '#6a3e18';
  const hoodLit = selected ? '#aa7038' : '#8a5228';
  const hoodDrk = selected ? '#6a3a10' : '#4e2c0e';

  const hatBaseY  = headY - headR + 4;  // where hat meets head
  const hatTipX   = cx;                 // tip is centered
  const hatTipY   = hatBaseY - 32;      // height of the point
  const hatBaseL  = cx - 16;
  const hatBaseR  = cx + 16;

  // Hat left face (lit)
  ctx.fillStyle=hoodLit;
  ctx.beginPath();
  ctx.moveTo(hatTipX, hatTipY);
  ctx.lineTo(hatBaseL, hatBaseY);
  ctx.lineTo(cx, hatBaseY);
  ctx.closePath(); ctx.fill();

  // Hat right face (shadow)
  ctx.fillStyle=hoodDrk;
  ctx.beginPath();
  ctx.moveTo(hatTipX, hatTipY);
  ctx.lineTo(cx, hatBaseY);
  ctx.lineTo(hatBaseR, hatBaseY);
  ctx.closePath(); ctx.fill();

  // Hat brim: thin ellipse strip at base of hat
  ctx.fillStyle=hoodCol;
  ctx.beginPath(); ctx.ellipse(cx, hatBaseY, 18, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle=hoodLit;
  ctx.beginPath(); ctx.ellipse(cx - 3, hatBaseY - 1, 10, 2.5, 0, 0, Math.PI*2); ctx.fill();

  // ── Eyes: simple ovals with pupils ──
  ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.ellipse(cx-6, headY+1, 3.5, 2.5, -0.1, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.ellipse(cx+5, headY+1, 3.5, 2.5,  0.1, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a0e0e'; ctx.beginPath(); ctx.arc(cx-6, headY+1, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a0e0e'; ctx.beginPath(); ctx.arc(cx+5, headY+1, 2, 0, Math.PI*2); ctx.fill();
  // Shine
  ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(cx-5, headY, 1, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(cx+6, headY, 1, 0, Math.PI*2); ctx.fill();

  // ── Staff: wooden pole + natural tip (Forest Kingdom — no magic orb, earthy) ──
  const staffX = cx - bHalf - 4;
  ctx.strokeStyle='#7a4820'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(staffX, gY - 4); ctx.lineTo(staffX, headY - headR - 8); ctx.stroke();
  // Inner lighter grain
  ctx.strokeStyle='rgba(180,110,50,0.35)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(staffX+1, gY - 6); ctx.lineTo(staffX+1, headY - headR - 6); ctx.stroke();
  // Selection aura (green glow for forest)
  if (selected) {
    ctx.fillStyle='rgba(80,200,60,0.18)';
    ctx.beginPath(); ctx.arc(staffX, headY - headR - 10, 13, 0, Math.PI*2); ctx.fill();
  }
  // Staff tip — polished wood knot
  const orbY = headY - headR - 10;
  const og = ctx.createRadialGradient(staffX - 1, orbY - 1, 1, staffX, orbY, 6);
  og.addColorStop(0,'#d08840'); og.addColorStop(0.6,'#8a5020'); og.addColorStop(1,'#5a3010');
  ctx.fillStyle=og; ctx.beginPath(); ctx.arc(staffX, orbY, 6, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(160,100,30,0.5)'; ctx.lineWidth=1; ctx.stroke();

  // ── Selection glow: outline the cube (green for forest) ──
  if (selected) {
    ctx.strokeStyle='rgba(100,220,80,0.55)'; ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(cx - bHalf, bTop + tSkew);
    ctx.lineTo(cx, bTop);
    ctx.lineTo(cx + bHalf, bTop + tSkew);
    ctx.lineTo(cx + bHalf, bBot + tSkew);
    ctx.lineTo(cx, bBot);
    ctx.lineTo(cx - bHalf, bBot + tSkew);
    ctx.closePath(); ctx.stroke();
  }

  return oc;
}

function fillRR(ctx, x, y, w, h, r, col) {
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath(); ctx.fill();
}

// ══════════════════════════════════════════════════════
//  CITY TILE
// ══════════════════════════════════════════════════════
function makeCityTile() {
  // City tile needs extra ABOVE space for buildings
  const CITY_ABOVE = 130;
  const W=TC_W, H=CITY_ABOVE+TH+DEPTH;
  const oc=document.createElement('canvas'); oc.width=W; oc.height=H;
  const ctx=oc.getContext('2d');

  const topX=W/2, topY=CITY_ABOVE;
  const midLX=W/2-TW/2, midRX=W/2+TW/2, midY=CITY_ABOVE+TH/2;
  const botX=W/2, botY=CITY_ABOVE+TH;

  // Depth faces — Forest Kingdom stone base (warm gray)
  ctx.beginPath(); ctx.moveTo(botX,botY); ctx.lineTo(midRX,midY); ctx.lineTo(midRX,midY+DEPTH); ctx.lineTo(botX,botY+DEPTH); ctx.closePath();
  const seG=ctx.createLinearGradient(0,botY,0,botY+DEPTH); seG.addColorStop(0,'#6a605a'); seG.addColorStop(1,'#48403a'); ctx.fillStyle=seG; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(botX,botY); ctx.lineTo(midLX,midY); ctx.lineTo(midLX,midY+DEPTH); ctx.lineTo(botX,botY+DEPTH); ctx.closePath();
  const swG=ctx.createLinearGradient(0,botY,0,botY+DEPTH); swG.addColorStop(0,'#807870'); swG.addColorStop(1,'#585048'); ctx.fillStyle=swG; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1; ctx.stroke();

  // Top face — stone courtyard, green-tinged
  ctx.beginPath(); ctx.moveTo(topX,topY); ctx.lineTo(midRX,midY); ctx.lineTo(botX,botY); ctx.lineTo(midLX,midY); ctx.closePath();
  const tG=ctx.createLinearGradient(midLX,topY,midRX,botY); tG.addColorStop(0,'#9aac88'); tG.addColorStop(0.5,'#7a9068'); tG.addColorStop(1,'#587048'); ctx.fillStyle=tG; ctx.fill();

  // Stone grid — mossy cracks
  ctx.save(); ctx.beginPath(); ctx.moveTo(topX,topY); ctx.lineTo(midRX,midY); ctx.lineTo(botX,botY); ctx.lineTo(midLX,midY); ctx.closePath(); ctx.clip();
  ctx.strokeStyle='rgba(40,50,30,0.28)'; ctx.lineWidth=1;
  for(let i=0;i<5;i++) for(let j=0;j<4;j++) ctx.strokeRect(midLX+6+i*(TW/4.5), topY+j*(TH/3.2), TW/4.5-2, TH/3.2-1);
  ctx.restore();

  // Rim
  ctx.beginPath(); ctx.moveTo(topX,topY); ctx.lineTo(midLX,midY); ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(topX,topY); ctx.lineTo(midRX,midY); ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1.5; ctx.stroke();

  // ── Buildings — Forest Kingdom stone keep ──
  const bY=topY; // buildings grow upward from tile top vertex

  // Wall ring (partial arc above tile) — stone gray
  ctx.strokeStyle='rgba(150,140,120,0.80)'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.arc(topX, bY+14, 50, Math.PI, 0); ctx.stroke();
  ctx.strokeStyle='rgba(80,70,55,0.55)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(topX, bY+14, 50, Math.PI, 0); ctx.stroke();

  // Buildings: central keep + towers — warm gray stone
  drawIsoBox(ctx, topX,    bY-10, 30, 50, 28, '#bcb0a2','#ccc0b2','#7a706a');
  drawIsoBox(ctx, topX-34, bY+2,  22, 36, 24, '#b0a496','#c0b4a6','#706860');
  drawIsoBox(ctx, topX+30, bY+4,  20, 32, 22, '#b0a496','#c0b4a6','#706860');
  drawIsoBox(ctx, topX-20, bY+8,  16, 22, 18, '#a89e90','#b8ac9e','#686058');
  drawIsoBox(ctx, topX+16, bY+10, 16, 20, 16, '#a89e90','#b8ac9e','#686058');

  // Battlements on main keep — row of stone merlons
  for(let bi=-2; bi<=2; bi++) {
    if(Math.abs(bi)===1) continue;
    const mbx = topX+4 + bi*7, mby = bY-10-50;
    ctx.fillStyle='#ccc0b2';
    ctx.fillRect(mbx-4, mby-8, 7, 9);
    ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(mbx+1, mby-8, 2, 9);
  }

  // Spire on keep — dark iron cap
  const spX=topX+4, spBaseY=bY-10-50;
  ctx.fillStyle='#787268';
  ctx.beginPath(); ctx.moveTo(spX,spBaseY-28); ctx.lineTo(spX-7,spBaseY); ctx.lineTo(spX+7,spBaseY); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.beginPath(); ctx.moveTo(spX,spBaseY-28); ctx.lineTo(spX-7,spBaseY); ctx.lineTo(spX-2,spBaseY); ctx.closePath(); ctx.fill();

  // Flag pole — dark wood
  ctx.strokeStyle='#5a3010'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(spX,spBaseY-28); ctx.lineTo(spX,spBaseY-56); ctx.stroke();
  // Flag — Forest Kingdom red banner
  ctx.fillStyle='#c03818';
  ctx.beginPath(); ctx.moveTo(spX,spBaseY-56); ctx.lineTo(spX+18,spBaseY-50); ctx.lineTo(spX,spBaseY-44); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(220,80,40,0.45)'; ctx.beginPath(); ctx.moveTo(spX+1,spBaseY-54); ctx.lineTo(spX+16,spBaseY-50); ctx.lineTo(spX+1,spBaseY-46); ctx.closePath(); ctx.fill();

  return {canvas:oc, originY: CITY_ABOVE / H};
}

function drawIsoBox(ctx, cx, topY, w, h, depth, topCol, rCol, lCol) {
  const hw=w/2, slope=hw*.35;
  // SE wall (right, darker)
  ctx.fillStyle=rCol;
  ctx.beginPath(); ctx.moveTo(cx+hw,topY); ctx.lineTo(cx+hw,topY+depth); ctx.lineTo(cx,topY+depth+slope); ctx.lineTo(cx,topY+slope); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.22)'; ctx.lineWidth=0.5; ctx.stroke();
  // SW wall (left, darkest)
  ctx.fillStyle=lCol;
  ctx.beginPath(); ctx.moveTo(cx-hw,topY); ctx.lineTo(cx-hw,topY+depth); ctx.lineTo(cx,topY+depth+slope); ctx.lineTo(cx,topY+slope); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Roof (top face, lightest)
  ctx.beginPath(); ctx.moveTo(cx,topY-h); ctx.lineTo(cx+hw,topY-h+slope); ctx.lineTo(cx,topY-h+slope*2); ctx.lineTo(cx-hw,topY-h+slope); ctx.closePath();
  const rg=ctx.createLinearGradient(cx-hw,topY-h,cx+hw,topY); rg.addColorStop(0,lighten(topCol,24)); rg.addColorStop(1,darken(topCol,8)); ctx.fillStyle=rg; ctx.fill(); ctx.stroke();
  // Front wall (visible face)
  ctx.fillStyle=darken(topCol,16);
  ctx.beginPath(); ctx.moveTo(cx+hw,topY-h+slope); ctx.lineTo(cx+hw,topY); ctx.lineTo(cx,topY+slope); ctx.lineTo(cx,topY-h+slope*2); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Windows
  if(h>24){
    ctx.fillStyle='rgba(255,215,70,0.8)';
    ctx.fillRect(cx+hw*.25,topY-h*.5,5,7);
    ctx.fillRect(cx+hw*.5, topY-h*.4,4,6);
  }
}

// ── TEXTURE REGISTRATION ──
function generateTextures(sc) {
  // Terrain tiles
  for(const [type, t] of Object.entries(TERRAIN)) {
    const fn = FEAT_MAP[type] || null;
    const oc = makeTile(type, t, fn);
    sc.textures.addCanvas('tile_'+type, oc);
  }

  // Highlight tile
  const hlOC=document.createElement('canvas'); hlOC.width=TC_W; hlOC.height=TC_H;
  const hctx=hlOC.getContext('2d');
  const hTopX=TC_W/2, hTopY=ABOVE, hMidY=ABOVE+TH/2, hBotY=ABOVE+TH;
  hctx.beginPath(); hctx.moveTo(hTopX,hTopY); hctx.lineTo(hTopX+TW/2,hMidY); hctx.lineTo(hTopX,hBotY); hctx.lineTo(hTopX-TW/2,hMidY); hctx.closePath();
  hctx.fillStyle='rgba(60,230,80,0.18)'; hctx.fill();
  hctx.strokeStyle='rgba(80,255,100,0.9)'; hctx.lineWidth=2.5; hctx.stroke();
  hctx.beginPath(); hctx.moveTo(hTopX,hTopY+3); hctx.lineTo(hTopX+TW/2-3,hMidY); hctx.lineTo(hTopX,hBotY-3); hctx.lineTo(hTopX-TW/2+3,hMidY); hctx.closePath();
  hctx.strokeStyle='rgba(180,255,180,0.35)'; hctx.lineWidth=1; hctx.stroke();
  sc.textures.addCanvas('tile_highlight', hlOC);

  // ── Fog of war textures ──
  // Helper to draw a Civ/Polytopia-style fog diamond
  function makeFogCanvas(fillAlpha, edgeSoftness) {
    const fc=document.createElement('canvas'); fc.width=TC_W; fc.height=TC_H;
    const fx=fc.getContext('2d');
    const cx=TC_W/2, ty=ABOVE, my=ABOVE+TH/2, by=ABOVE+TH;
    // Radial gradient from center → edges makes a soft Civ-style fog
    const grad=fx.createRadialGradient(cx, my, 0, cx, my, TW*.62);
    grad.addColorStop(0,   `rgba(8,14,6,${fillAlpha})`);
    grad.addColorStop(0.6, `rgba(8,14,6,${fillAlpha})`);
    grad.addColorStop(1,   `rgba(8,14,6,${fillAlpha*edgeSoftness})`);
    // Clip to diamond shape
    fx.save();
    fx.beginPath(); fx.moveTo(cx,ty); fx.lineTo(cx+TW/2,my); fx.lineTo(cx,by); fx.lineTo(cx-TW/2,my); fx.closePath();
    fx.clip();
    fx.fillStyle=grad; fx.fillRect(0,0,TC_W,TC_H);
    fx.restore();
    // Subtle border so tiles don't bleed into each other
    fx.beginPath(); fx.moveTo(cx,ty); fx.lineTo(cx+TW/2,my); fx.lineTo(cx,by); fx.lineTo(cx-TW/2,my); fx.closePath();
    fx.strokeStyle=`rgba(20,40,15,${fillAlpha*.5})`; fx.lineWidth=1; fx.stroke();
    return fc;
  }
  // tile_fog = completely unexplored (very dark, nearly opaque)
  sc.textures.addCanvas('tile_fog', makeFogCanvas(0.92, 0.25));
  // tile_fog_seen = explored but not currently in sight range (darker tint, still shows terrain)
  sc.textures.addCanvas('tile_fog_seen', makeFogCanvas(0.48, 0.1));

  // Resource badge canvas (small, drawn on top of tile)
  // We'll use a single 32x32 canvas per resource with emoji
  for(const [rk, res] of Object.entries(RESOURCES)) {
    const rc=document.createElement('canvas'); rc.width=32; rc.height=32;
    const rctx=rc.getContext('2d');
    // Badge background
    rctx.fillStyle='rgba(10,18,8,0.75)';
    rctx.beginPath(); rctx.arc(16,16,14,0,Math.PI*2); rctx.fill();
    rctx.strokeStyle = res.type==='luxury' ? '#f0d060' : res.type==='strategic' ? '#e06030' : '#a0c860';
    rctx.lineWidth=1.5; rctx.stroke();
    rctx.font='16px serif'; rctx.textAlign='center'; rctx.textBaseline='middle';
    rctx.fillText(res.emoji, 16, 17);
    sc.textures.addCanvas('res_'+rk, rc);
  }

  // City tile
  const {canvas:cityOC, originY:cityOY} = makeCityTile();
  sc.textures.addCanvas('tile_city', cityOC);
  sc._cityOriginY = cityOY;

  // Settler
  sc.textures.addCanvas('settler_normal',   makeSettler(false));
  sc.textures.addCanvas('settler_selected', makeSettler(true));
}

// ══════════════════════════════════════════════════════
//  PHASER SCENE
// ══════════════════════════════════════════════════════
let scene_ref=null;

class GameScene extends Phaser.Scene {
  constructor(){super({key:'GameScene'});}

  create(){
    scene_ref=this;
    generateTextures(this);
    this.cameras.main.setBackgroundColor('#1a2430');

    this.terrainLayer   = this.add.container(0,0);
    this.resourceLayer  = this.add.container(0,0);
    this.highlightLayer = this.add.container(0,0);
    this.unitLayer      = this.add.container(0,0);
    this.labelLayer     = this.add.container(0,0);
    this.fogLayer       = this.add.container(0,0);

    // ── Toroidal world: render 3×3 copies of the map for seamless wrapping ──
    // The canonical (dc=0, dr=0) copy holds game-state sprites.
    // Ghost copies (dc=±1, dr=±1) mirror textures for visual continuity.
    // World offsets in isometric screen space for each copy:
    //   col offset +COLS → isoPos shift of (+COLS*STEP_X - COLS*STEP_X, (COLS)*STEP_Y) = wait, correct:
    //   isoPos(c+COLS, r) = ((c+COLS-r)*STEP_X, (c+COLS+r)*STEP_Y) = isoPos(c,r) + (COLS*STEP_X, COLS*STEP_Y)
    //   isoPos(c, r+ROWS) = isoPos(c,r) + (-ROWS*STEP_X, ROWS*STEP_Y)
    const WORLD_OX = COLS * STEP_X;   // x shift per col-copy
    const WORLD_OY = COLS * STEP_Y;   // y shift per col-copy (east wrap)
    const WORLD_RX = -ROWS * STEP_X;  // x shift per row-copy
    const WORLD_RY = ROWS * STEP_Y;   // y shift per row-copy (south wrap)

    this.tileSprites={};  // canonical only: key='c_r'
    this.ghostSprites={}; // ghost copies: key='dc_dr_c_r'

    for(let dr=-1; dr<=1; dr++) for(let dc=-1; dc<=1; dc++){
      const offX = dc*WORLD_OX + dr*WORLD_RX;
      const offY = dc*WORLD_OY + dr*WORLD_RY;
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        const type=MAP_DATA[r][c];
        const {x,y}=isoPos(c,r);
        const sp=this.add.image(x+offX, y+offY, 'tile_'+type).setOrigin(OX, OY);
        this.terrainLayer.add(sp);
        if(dc===0 && dr===0){
          this.tileSprites[`${c}_${r}`]=sp;
        } else {
          this.ghostSprites[`${dc}_${dr}_${c}_${r}`]=sp;
        }
      }
    }

    // Resource sprites (canonical copy only)
    this.resSp={};
    for(const [key, rk] of Object.entries(RESOURCE_MAP)){
      const [c,r]=key.split('_').map(Number);
      const {x,y}=isoPos(c,r);
      const sp=this.add.image(x+12, y+TH/2-8, 'res_'+rk).setOrigin(0.5,0.5).setScale(0.85).setAlpha(0);
      this.resourceLayer.add(sp);
      this.resSp[key]=sp;
    }

    // Highlight overlay sprites (canonical only)
    this.hlSprites={};
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const {x,y}=isoPos(c,r);
      const sp=this.add.image(x, y, 'tile_highlight').setOrigin(OX, OY).setAlpha(0);
      this.highlightLayer.add(sp);
      this.hlSprites[`${c}_${r}`]=sp;
    }

    // Fog of war sprites — 3×3 copies for seamless wrapping appearance
    this.fogSprites={};
    for(let dr=-1; dr<=1; dr++) for(let dc=-1; dc<=1; dc++){
      const offX = dc*WORLD_OX + dr*WORLD_RX;
      const offY = dc*WORLD_OY + dr*WORLD_RY;
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        const {x,y}=isoPos(c,r);
        const sp=this.add.image(x+offX, y+offY, 'tile_fog').setOrigin(OX, OY);
        this.fogLayer.add(sp);
        if(dc===0 && dr===0) this.fogSprites[`${c}_${r}`]=sp;
        else this.ghostSprites[`fog_${dc}_${dr}_${c}_${r}`]=sp;
      }
    }
    // Store ghost fog sprites separately for sync
    this.ghostFogSprites={};
    for(let dr=-1; dr<=1; dr++) for(let dc=-1; dc<=1; dc++){
      if(dc===0 && dr===0) continue;
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        this.ghostFogSprites[`${dc}_${dr}_${c}_${r}`]=this.ghostSprites[`fog_${dc}_${dr}_${c}_${r}`];
      }
    }

    // Spawn settler — find a good passable starting tile
    let SC=5, SR=5;
    // Find a passable tile near center
    for(let attempt=0;attempt<50;attempt++){
      const tc=5+Math.floor(Math.random()*6), tr=4+Math.floor(Math.random()*4);
      if(MAP_DATA[tr]&&TERRAIN[MAP_DATA[tr][tc]]&&TERRAIN[MAP_DATA[tr][tc]].passable){
        SC=tc; SR=tr; break;
      }
    }
    GS.units.push({id:GS.nextUnitId++,type:'settler',col:SC,row:SR,movesLeft:2});
    this.unitSprites={};
    this.spawnUnit(GS.units[0]);

    // Reveal area around starting settler
    this.revealAround(SC, SR, 3);

    // Camera center
    const {x:sx,y:sy}=isoPos(SC,SR);
    this.cameras.main.centerOn(sx, sy+TH/2);
    // No bounds — toroidal infinite world, camera can scroll forever

    // ── Input ──
    this._dragStartX=0; this._dragStartY=0; this._hasDragged=false;
    this._prevPtrX=0; this._prevPtrY=0;
    this.input.on('pointerdown', p=>{
      this._dragStartX=p.x; this._dragStartY=p.y;
      this._prevPtrX=p.x; this._prevPtrY=p.y;
      this._hasDragged=false;
    });
    this.input.on('pointermove', p=>{
      if(p.isDown){
        const dx=p.x-this._prevPtrX, dy=p.y-this._prevPtrY;
        if(Math.abs(p.x-this._dragStartX)>6||Math.abs(p.y-this._dragStartY)>6) this._hasDragged=true;
        if(this._hasDragged){
          // Delta-based: move camera exactly as far as finger moved, no extrapolation
          this.cameras.main.scrollX -= dx/this.cameras.main.zoom;
          this.cameras.main.scrollY -= dy/this.cameras.main.zoom;
        }
        this._prevPtrX=p.x; this._prevPtrY=p.y;
      }
      // Tooltip on hover
      this.showTileTooltip(p);
    });
    this.input.on('pointerout', ()=>hideTileTooltip());
    this.input.on('pointerup', p=>{if(!this._hasDragged)this.handleClick(p); hideTileTooltip();});
    this.input.on('wheel',(_p,_o,_dx,dy)=>{
      this.cameras.main.zoom=Phaser.Math.Clamp(this.cameras.main.zoom-dy*.0009,0.3,2.5);
    });

    this._t=0;
    this.time.addEvent({delay:16,loop:true,callback:this.tick,callbackScope:this});
    updateHUD();
    showStatus('Your empire awaits. Select your settler to begin.',4000);
  }

  revealAround(col, row, radius){
    const wc=wrapC(col), wr=wrapR(row);
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const key=`${c}_${r}`;
      // Toroidal sight distance
      let dc=Math.abs(c-wc), dr=Math.abs(r-wr);
      if(dc>COLS/2) dc=COLS-dc;
      if(dr>ROWS/2) dr=ROWS-dr;
      const inSight = dc<=radius && dr<=radius;

      const applyFog=(sp, tex, alpha)=>{
        if(!sp) return;
        if(tex && sp.texture.key!==tex) sp.setTexture(tex);
        sp.setAlpha(alpha);
      };

      if(inSight){
        GS.revealed.add(key);
        applyFog(this.fogSprites[key], null, 0);
        // Also clear all ghost copies
        for(let gdr=-1;gdr<=1;gdr++) for(let gdc=-1;gdc<=1;gdc++){
          if(gdc===0&&gdr===0) continue;
          applyFog(this.ghostFogSprites[`${gdc}_${gdr}_${c}_${r}`], null, 0);
        }
        if(this.resSp[key]) this.resSp[key].setAlpha(1);
      } else if(GS.revealed.has(key)){
        applyFog(this.fogSprites[key], 'tile_fog_seen', 1);
        for(let gdr=-1;gdr<=1;gdr++) for(let gdc=-1;gdc<=1;gdc++){
          if(gdc===0&&gdr===0) continue;
          applyFog(this.ghostFogSprites[`${gdc}_${gdr}_${c}_${r}`], 'tile_fog_seen', 1);
        }
      }
    }
  }

  showTileTooltip(p){
    const wx=p.worldX, wy=p.worldY;
    let best=null, bestD=Infinity;
    // Search across 3×3 world copies
    const WORLD_OX = COLS * STEP_X; const WORLD_OY = COLS * STEP_Y;
    const WORLD_RX = -ROWS * STEP_X; const WORLD_RY = ROWS * STEP_Y;
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      const offX=dc*WORLD_OX+dr*WORLD_RX, offY=dc*WORLD_OY+dr*WORLD_RY;
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        const pos=isoPos(c,r);
        const cx=pos.x+offX, cy=pos.y+offY+TH/2;
        const dx=Math.abs(wx-cx)/(TW*.52), dy=Math.abs(wy-cy)/(TH*.52);
        const d=dx+dy;
        if(d<bestD){bestD=d;best={col:c,row:r};}
      }
    }
    if(!best||bestD>1.5) return hideTileTooltip();
    const {col,row}=best;
    const key=`${wrapC(col)}_${wrapR(row)}`;
    if(!GS.revealed.has(key)) return hideTileTooltip();

    const tType=terrainAt(col,row);
    if(!tType) return hideTileTooltip();
    const t=TERRAIN[tType];
    const yields=getTileYield(wrapC(col),wrapR(row),MAP_DATA,RESOURCE_MAP);
    const rKey=resourceAt(col,row);

    const tt=document.getElementById('tile-tooltip');
    document.getElementById('tt-title').textContent=t.label;
    const yparts=[];
    if(yields.f) yparts.push(`🍎 ${yields.f}`);
    if(yields.p) yparts.push(`⚒ ${yields.p}`);
    if(yields.g) yparts.push(`💰 ${yields.g}`);
    if(yields.s) yparts.push(`📚 ${yields.s}`);
    document.getElementById('tt-yields').textContent=yparts.join('  ') || 'No yield';
    document.getElementById('tt-resource').textContent=rKey ? `${RESOURCES[rKey].emoji} ${RESOURCES[rKey].label}` : '';

    tt.style.display='block';
    tt.style.left=(p.x+18)+'px';
    tt.style.top=(p.y-10)+'px';
  }

  spawnUnit(unit){
    const {x,y}=isoPos(unit.col,unit.row);
    // Place feet at the tile's visual center (midpoint of diamond, not bottom tip)
    const footX=x, footY=y+TH/2;
    const shadow=this.add.ellipse(footX, footY+2, 22, 8, 0x000000, 0.30);
    const sp=this.add.image(footX, footY, 'settler_normal').setOrigin(0.5,1.0);
    this.unitLayer.add(shadow); this.unitLayer.add(sp);
    this.unitSprites[unit.id]={sprite:sp, shadow, baseX:footX, baseY:footY};
  }

  tick(){
    this._t+=0.022;
    const t=this._t;

    for(const unit of GS.units){
      const s=this.unitSprites[unit.id]; if(!s) continue;

      const isSel=GS.selectedUnit&&GS.selectedUnit.id===unit.id;
      s.sprite.setTexture(isSel?'settler_selected':'settler_normal');
      s.sprite.y=s.baseY; // no floating

      if(isSel){
        if(!s.selRing){s.selRing=this.add.ellipse(s.baseX,s.baseY,44,16,0,0).setStrokeStyle(2.5,0x78e040,1);this.unitLayer.add(s.selRing);}
        s.selRing.x=s.baseX; s.selRing.y=s.baseY+2;
        if(!s.pulseRing){s.pulseRing=this.add.ellipse(s.baseX,s.baseY,44,16,0,0).setStrokeStyle(2.5,0x78e040,0);this.unitLayer.add(s.pulseRing);}
        const pulse=(Math.sin(t*2.5)+1)*.5;
        s.pulseRing.x=s.baseX; s.pulseRing.y=s.baseY+2;
        s.pulseRing.setSize(44+pulse*16,16+pulse*6); s.pulseRing.setStrokeStyle(2.5,0x78e040,pulse*.45);
      } else {
        if(s.selRing){s.selRing.destroy();s.selRing=null;}
        if(s.pulseRing){s.pulseRing.destroy();s.pulseRing=null;}
      }
    }

    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const sp=this.hlSprites[`${c}_${r}`]; if(!sp) continue;
      const isHL=GS.moveHighlights.some(h=>h.col===c&&h.row===r);
      if(isHL){const p=(Math.sin(t*1.8+c*.4+r*.6)+1)*.5;sp.setAlpha(.45+p*.45);}
      else sp.setAlpha(0);
    }

    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      if(TERRAIN[terrainAt(c,r)].water){
        const alpha=.80+Math.sin(t*.6+c*.35+r*.25)*.1;
        const sp=this.tileSprites[`${c}_${r}`];
        if(sp) sp.setAlpha(alpha);
        // Sync ghost copies
        for(let gdr=-1;gdr<=1;gdr++) for(let gdc=-1;gdc<=1;gdc++){
          if(gdc===0&&gdr===0) continue;
          const gs=this.ghostSprites[`${gdc}_${gdr}_${c}_${r}`];
          if(gs) gs.setAlpha(alpha);
        }
      }
    }
  }

  handleClick(ptr){
    const wx=ptr.worldX, wy=ptr.worldY;
    let best=null, bestD=Infinity;
    // Search across 3×3 world copies to handle wrapping
    const WORLD_OX = COLS * STEP_X; const WORLD_OY = COLS * STEP_Y;
    const WORLD_RX = -ROWS * STEP_X; const WORLD_RY = ROWS * STEP_Y;
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      const offX=dc*WORLD_OX+dr*WORLD_RX, offY=dc*WORLD_OY+dr*WORLD_RY;
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        const p=isoPos(c,r);
        const cx=p.x+offX, cy=p.y+offY+TH/2;
        const dx=Math.abs(wx-cx)/(TW*.52), dy=Math.abs(wy-cy)/(TH*.52);
        const d=dx+dy;
        if(d<bestD){bestD=d;best={col:c,row:r};}
      }
    }
    if(!best||bestD>1.8) return;
    const {col,row}=best;

    const clickedUnit=GS.units.find(u=>u.col===col&&u.row===row);
    const isHL=GS.moveHighlights.some(h=>h.col===col&&h.row===row);

    if(isHL&&GS.selectedUnit){this.moveUnit(GS.selectedUnit,col,row);return;}
    if(clickedUnit){GS.selectedUnit=clickedUnit;GS.moveHighlights=clickedUnit.movesLeft>0?getMovable(clickedUnit,clickedUnit.movesLeft):[];updateHUD();return;}
    GS.selectedUnit=null;GS.moveHighlights=[];updateHUD();
  }

  moveUnit(unit,col,row){
    const s=this.unitSprites[unit.id]; if(!s) return;
    const {x,y}=isoPos(col,row);
    const newFX=x, newFY=y+TH/2;
    const peakY=Math.min(s.baseY,newFY)-36;

    this.tweens.add({targets:s.sprite, x:newFX, duration:380, ease:'Cubic.easeInOut'});
    this.tweens.add({targets:s.shadow, x:newFX, duration:380, ease:'Cubic.easeInOut'});
    if(s.selRing) this.tweens.add({targets:s.selRing, x:newFX, duration:380, ease:'Cubic.easeInOut'});
    if(s.pulseRing) this.tweens.add({targets:s.pulseRing,x:newFX,duration:380,ease:'Cubic.easeInOut'});
    this.tweens.add({targets:s.sprite, y:peakY, duration:190, ease:'Quad.easeOut',
      onComplete:()=>this.tweens.add({targets:s.sprite,y:newFY,duration:190,ease:'Quad.easeIn'})});

    unit.col=col; unit.row=row; unit.movesLeft--;
    s.baseX=newFX; s.baseY=newFY;
    this.revealAround(col, row, 2);
    GS.moveHighlights=unit.movesLeft>0?getMovable(unit,unit.movesLeft):[];
    updateHUD();
  }

  foundCity(){
    const u=GS.selectedUnit; if(!u) return;
    const type=terrainAt(u.col,u.row);
    if(!TERRAIN[type].passable){showStatus('Cannot found here!');return;}
    if(GS.cities.some(c=>hexDist(c.col,c.row,u.col,u.row)<3)){showStatus('Too close to another city!');return;}
    const name=CITY_NAMES[(GS.nextCityId-1)%CITY_NAMES.length];
    const territory=getNeighbors(u.col,u.row).filter(n=>TERRAIN[terrainAt(n.col,n.row)].passable).map(n=>({col:n.col,row:n.row}));
    GS.cities.push({id:GS.nextCityId++,col:u.col,row:u.row,name,pop:1,territory,food:0,foodToGrow:10});
    this.revealAround(u.col, u.row, 3);

    const sp=this.tileSprites[`${wrapC(u.col)}_${wrapR(u.row)}`];
    if(sp){
      this.tweens.add({targets:sp,scaleY:1.1,yoyo:true,duration:180,ease:'Quad.easeOut',
        onComplete:()=>{
          sp.setTexture('tile_city');sp.setOrigin(OX, this._cityOriginY);
          // Sync ghost copies
          for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
            if(dc===0&&dr===0) continue;
            const gs=this.ghostSprites[`${dc}_${dr}_${wrapC(u.col)}_${wrapR(u.row)}`];
            if(gs){gs.setTexture('tile_city');gs.setOrigin(OX, this._cityOriginY);}
          }
        }});
    }

    for(const h of territory){
      const hs=this.tileSprites[`${h.col}_${h.row}`];
      if(hs) this.tweens.add({targets:hs,alpha:.6,yoyo:true,duration:320,repeat:1,ease:'Sine.easeInOut'});
    }

    const {x,y}=isoPos(u.col,u.row);
    const lbl=this.add.text(x,y-12,name,{fontFamily:'Cinzel,serif',fontSize:'13px',fontStyle:'bold',color:'#f0d080',stroke:'#000000',strokeThickness:4}).setOrigin(.5,1);
    this.labelLayer.add(lbl);

    const s=this.unitSprites[u.id];
    if(s){
      this.tweens.add({targets:[s.sprite,s.shadow],alpha:0,scaleX:1.4,scaleY:1.4,y:'-=18',duration:500,ease:'Cubic.easeOut',
        onComplete:()=>{s.sprite.destroy();s.shadow.destroy();if(s.selRing)s.selRing.destroy();if(s.pulseRing)s.pulseRing.destroy();}});
    }
    GS.units=GS.units.filter(x=>x.id!==u.id);
    GS.selectedUnit=null;GS.moveHighlights=[];
    showStatus(`✦ ${name} has been founded!`); updateHUD();
  }
}

// ── HUD ──
function hideTileTooltip(){const tt=document.getElementById('tile-tooltip');if(tt)tt.style.display='none';}

function updateHUD(){
  const u=GS.selectedUnit;
  // Recalculate income
  GS.income=computeIncome(MAP_DATA,RESOURCE_MAP,GS.cities);
  document.getElementById('res-food').textContent='+'+GS.income.f;
  document.getElementById('res-prod').textContent='+'+GS.income.p;
  document.getElementById('res-gold').textContent='+'+GS.income.g;
  document.getElementById('res-sci').textContent='+'+GS.income.s;
  document.getElementById('res-cult').textContent='+'+GS.income.c;
  document.getElementById('res-cities').textContent=GS.cities.length;
  document.getElementById('turn-info').textContent=`Turn ${GS.turn}`;

  if(!u){document.getElementById('unit-name').textContent='No unit selected';document.getElementById('unit-desc').textContent='Click a unit to select it.';document.getElementById('action-btns').innerHTML='';return;}
  const tType=terrainAt(u.col,u.row)||'plains';
  const yields=getTileYield(wrapC(u.col),wrapR(u.row),MAP_DATA,RESOURCE_MAP);
  const rKey=resourceAt(u.col,u.row);
  document.getElementById('unit-name').textContent='⚑ Settler';
  document.getElementById('unit-desc').textContent=
    `${TERRAIN[tType].label}${rKey?' · '+RESOURCES[rKey].label:''} · Moves: ${u.movesLeft}/2 · Tile: 🍎${yields.f} ⚒${yields.p} 💰${yields.g}`;
  document.getElementById('action-btns').innerHTML=
    `<button class="abtn" onclick="scene_ref.foundCity()">🏙 Found City</button>`+
    `<button class="abtn" onclick="GS.selectedUnit=null;GS.moveHighlights=[];updateHUD()">⏭ Skip</button>`;
}

function endTurn(){
  GS.turn++;
  for(const u of GS.units) u.movesLeft=2;
  // City growth
  for(const c of GS.cities){
    c.food=(c.food||0)+Math.max(0,GS.income.f-c.pop*2);
    if(c.food>=(c.foodToGrow||10)){c.pop=Math.min(20,c.pop+1);c.food=0;c.foodToGrow=Math.round((c.foodToGrow||10)*1.5);showStatus(`🌱 ${c.name} grew to pop ${c.pop}!`);}
  }
  showStatus(`Turn ${GS.turn} begins`);
  updateHUD();
}
function showStatus(msg,d=2500){const el=document.getElementById('status-msg');el.textContent=msg;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',d);}

// ── INIT ──
let phaserGame=null;
function startGame(){
  document.getElementById('menu-overlay').style.display='none';
  document.getElementById('top-bar').style.display='flex';
  document.getElementById('bot-panel').style.display='flex';
  phaserGame=new Phaser.Game({
    type:Phaser.AUTO, width:window.innerWidth, height:window.innerHeight-TOP_H-BOT_H,
    parent:'game-container', backgroundColor:'#1a2430', scene:[GameScene],
    scale:{mode:Phaser.Scale.RESIZE, autoCenter:Phaser.Scale.CENTER_BOTH},
    render:{antialias:true, pixelArt:false},
  });
  setTimeout(()=>{
    const cv=document.querySelector('#game-container canvas');
    if(cv){cv.style.position='fixed';cv.style.top=TOP_H+'px';cv.style.left='0';}
  },200);
  window.addEventListener('resize',()=>{if(phaserGame)phaserGame.scale.resize(window.innerWidth,window.innerHeight-TOP_H-BOT_H);});
}
</script>
