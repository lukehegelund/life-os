<head>

<title>Mark Berean — Life OS</title>
<link rel="stylesheet" href="css/main.css?v=2" onerror="this.remove()">
<style>
  /* ── Reader-specific styles ── */
  :root {
    --accent: #16a34a;
    --spanish-bg: #f0fdf4;
    --spanish-color: #15803d;
    --spanish-border: #bbf7d0;
    --vnum-color: #9ca3af;
  }

  .reader-controls {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .ctrl-label {
    font-size: 13px;
    color: var(--gray-400);
    white-space: nowrap;
  }

  /* ── Chapter selector ── */
  #chapterSelect {
    padding: 6px 10px;
    border: 1.5px solid var(--gray-200);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    background: var(--white);
    color: var(--gray-800);
    cursor: pointer;
  }
  #chapterSelect:focus { outline: none; border-color: var(--accent); }

  /* ── Range slider ── */
  #range-wrap {
    position: relative;
    flex: 1;
    min-width: 140px;
    max-width: 380px;
    height: 28px;
  }
  #range-track {
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 4px;
    background: var(--gray-200);
    border-radius: 2px;
    transform: translateY(-50%);
  }
  #range-fill {
    position: absolute;
    top: 50%;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    transform: translateY(-50%);
    pointer-events: none;
  }
  #range-wrap input[type=range] {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 100%;
    height: 4px;
    background: transparent;
    pointer-events: none;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
  }
  #range-wrap input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    pointer-events: all;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.25);
    cursor: pointer;
  }
  #range-wrap input[type=range]::-moz-range-thumb {
    pointer-events: all;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.25);
    cursor: pointer;
  }

  /* ── Number inputs ── */
  .num-input {
    font-size: 13px;
    width: 58px;
    padding: 4px 6px;
    border: 1px solid var(--spanish-border);
    border-radius: 6px;
    color: var(--accent);
    font-weight: 600;
    text-align: center;
    outline: none;
    background: var(--spanish-bg);
    -moz-appearance: textfield;
  }
  .num-input::-webkit-inner-spin-button,
  .num-input::-webkit-outer-spin-button { opacity: 1; }
  .num-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(22,163,74,.15);
  }

  /* ── Badge + coverage ── */
  #badge {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background: var(--spanish-bg);
    border: 1px solid var(--spanish-border);
    border-radius: 20px;
    padding: 3px 12px;
    white-space: nowrap;
    text-align: center;
  }
  #coverage {
    font-size: 12px;
    color: var(--gray-400);
    white-space: nowrap;
  }

  /* ── Color toggle ── */
  #color-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--gray-400);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  #colorToggle {
    accent-color: var(--accent);
    cursor: pointer;
    width: 14px; height: 14px;
  }

  /* ── Verse text area ── */
  #text {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px 0 80px;
    font-family: Georgia, 'Times New Roman', serif;
    line-height: 1.85;
  }

  #text h2 {
    font-size: 1.1rem;
    font-weight: 600;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--gray-400);
    margin: 32px 0 12px;
  }

  p.verse {
    margin-bottom: .2em;
    font-size: 1.05rem;
  }

  .vnum {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: .72rem;
    font-weight: 600;
    color: var(--vnum-color);
    vertical-align: super;
    margin-right: 2px;
    user-select: none;
  }

  /* ── Word states ── */
  span[data-w] {
    transition: background .12s, color .12s;
    border-radius: 2px;
  }
  span[data-w].spanish {
    color: var(--spanish-color);
    background: var(--spanish-bg);
    padding: 0 1px;
  }
  body.plain-mode span[data-w].spanish {
    color: inherit;
    background: none;
    padding: 0;
  }

  /* ── Loading state ── */
  #loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-400);
    font-size: 15px;
  }
  .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--gray-200);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient(
  'https://kxsuzgpnvtepsyhkezin.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4c3V6Z3BudnRlcHN5aGtlemluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Nzc1MDAsImV4cCI6MjA4NzM1MzUwMH0.oKtpiH63heyK-wJ87ZRvkhUzRqy6NT6Z2XWF1xjbtxA'
);

// ── DOM refs ──
const chapterSelect = document.getElementById('chapterSelect');
const sliderMin  = document.getElementById('sliderMin');
const sliderMax  = document.getElementById('sliderMax');
const numMin     = document.getElementById('numMin');
const numMax     = document.getElementById('numMax');
const rangeFill  = document.getElementById('range-fill');
const badge      = document.getElementById('badge');
const coverage   = document.getElementById('coverage');
const colorToggle = document.getElementById('colorToggle');
const textDiv    = document.getElementById('text');
const loadingDiv = document.getElementById('loading');

// ── State ──
let FREQ = {};        // { english_lc: [rank, spanish_text] }
let VERSES = [];      // all verses from DB
let MAX_RANK = 2098;
let currentChapter = 1;

// ── Load data from Supabase ──
async function loadData() {
  const [freqRes, versesRes] = await Promise.all([
    supabase.from('diglot_berean_frequency').select('*').limit(5000),
    supabase.from('diglot_berean_verses').select('*').order('chapter').order('verse'),
  ]);

  if (freqRes.error || versesRes.error) {
    loadingDiv.innerHTML = '<div style="color:var(--coral);">Error loading data. Check console.</div>';
    console.error('Freq error:', freqRes.error, 'Verses error:', versesRes.error);
    return;
  }

  // Build frequency map: english_lc -> [rank, spanish]
  const freqRows = freqRes.data || [];
  let maxR = 0;
  freqRows.forEach(r => {
    const key = (r.word || '').toLowerCase();
    if (key) {
      FREQ[key] = [r.rank || 0, r.spanish || ''];
      if (r.rank > maxR) maxR = r.rank;
    }
  });
  MAX_RANK = maxR || 2087;

  // Update slider max
  sliderMin.max = MAX_RANK;
  sliderMax.max = MAX_RANK;
  numMin.max = MAX_RANK;
  numMax.max = MAX_RANK;

  VERSES = versesRes.data || [];

  // Populate chapter selector
  const chapters = [...new Set(VERSES.map(v => v.chapter))].sort((a, b) => a - b);
  chapterSelect.innerHTML = '';
  chapters.forEach(ch => {
    const opt = document.createElement('option');
    opt.value = ch;
    opt.textContent = ch;
    chapterSelect.appendChild(opt);
  });

  if (chapters.length > 0) {
    currentChapter = chapters[0];
    chapterSelect.value = currentChapter;
  }

  loadingDiv.style.display = 'none';
  textDiv.style.display = '';
  renderChapter();
}

// ── Render chapter ──
function renderChapter() {
  const chVerses = VERSES.filter(v => v.chapter === currentChapter);
  textDiv.innerHTML = `<h2>Chapter ${currentChapter}</h2>`;

  chVerses.forEach(v => {
    const p = document.createElement('p');
    p.className = 'verse';

    // Verse number
    const vnSpan = document.createElement('span');
    vnSpan.className = 'vnum';
    vnSpan.textContent = v.verse;
    p.appendChild(vnSpan);
    p.appendChild(document.createTextNode(' '));

    // Parse word_pairs: each entry is [english, spanish]
    const words = v.word_pairs || [];
    if (Array.isArray(words) && words.length > 0) {
      words.forEach((pair, i) => {
        const eng = Array.isArray(pair) ? (pair[0] || '') : (pair.english || '');
        const es  = Array.isArray(pair) ? (pair[1] || '') : (pair.spanish || '');
        const span = document.createElement('span');
        span.dataset.w = eng.toLowerCase().replace(/[^a-z']/g, '');
        span.dataset.es = es;
        span.dataset.orig = eng;
        span.textContent = eng;
        p.appendChild(span);
        if (i < words.length - 1) p.appendChild(document.createTextNode(' '));
      });
    } else {
      p.appendChild(document.createTextNode(v.english_text || ''));
    }

    textDiv.appendChild(p);
  });

  update();
}

// ── Get word rank ──
function getWordRank(span) {
  const key = span.dataset.w;
  if (!key) return undefined;
  const entry = FREQ[key];
  return entry ? entry[0] : undefined;
}

// ── Update word states based on slider ──
function update() {
  const lo = parseInt(sliderMin.value) || 0;
  const hi = parseInt(sliderMax.value) || 0;
  const spans = textDiv.querySelectorAll('span[data-w]');
  const spanArr = Array.from(spans);
  let totalTokens = spans.length;

  // Update spans
  spans.forEach(s => {
    const rank = getWordRank(s);
    // Multi-word tokens (e.g. "of the" → "del") have no rank in the
    // frequency table. If a Spanish translation exists in dataset.es,
    // always show it in Spanish — these are inseparable chunks that
    // must be swapped as a unit whenever any word is in range.
    if (rank === undefined) {
      if (hi > 0 && s.dataset.es !== undefined) {
        // Empty string means this word is absorbed into an adjacent
        // Spanish phrase — hide the span so no English leaks through.
        if (s.dataset.es === '') {
          s.textContent = '';
          s.style.display = 'none';
          s.classList.add('spanish');
        } else {
          s.textContent = s.dataset.es;
          s.style.display = '';
          s.classList.add('spanish');
        }
      } else {
        s.textContent = s.dataset.orig;
        s.style.display = '';
        s.classList.remove('spanish');
      }
      return;
    }

    if (rank >= lo && rank <= hi) {
      // Prefer the contextual pair translation (dataset.es) from word_pairs
      // over the generic frequency-table translation. The frequency table
      // stores dictionary forms (e.g. "decir") while dataset.es has the
      // conjugated, context-correct form (e.g. "digo").
      if (s.dataset.es === '') {
        // Absorbed into adjacent phrase — hide span
        s.textContent = '';
        s.style.display = 'none';
        s.classList.add('spanish');
      } else {
        const freqEntry = FREQ[s.dataset.w];
        const esText = s.dataset.es || (freqEntry ? freqEntry[1] : s.dataset.orig);
        s.textContent = esText;
        s.style.display = '';
        s.classList.add('spanish');
      }
    } else {
      s.textContent = s.dataset.orig;
      s.style.display = '';
      s.classList.remove('spanish');
    }
  });

  // Capitalise first Spanish word in each verse
  spanArr.forEach((s, i) => {
    if (!s.classList.contains('spanish')) return;
    const prev = spanArr[i - 1];
    if (!prev || prev.closest('p') !== s.closest('p')) {
      const t = s.textContent;
      s.textContent = t.charAt(0).toUpperCase() + t.slice(1);
    }
  });

  // Update track fill
  const pctLo = (lo / MAX_RANK) * 100;
  const pctHi = (hi / MAX_RANK) * 100;
  rangeFill.style.left  = pctLo + '%';
  rangeFill.style.width = (pctHi - pctLo) + '%';

  // Update badge
  if (hi === 0) {
    badge.textContent = 'All English';
  } else if (lo <= 1) {
    badge.textContent = `Top ${hi} words → Spanish`;
  } else {
    badge.textContent = `Ranks ${lo}–${hi} → Spanish`;
  }

  // Update coverage
  let spanishCount = 0;
  spans.forEach(s => { if (s.classList.contains('spanish')) spanishCount++; });
  const pct = totalTokens > 0 ? Math.round((spanishCount / totalTokens) * 100) : 0;
  coverage.textContent = `${pct}% of words in Spanish`;
}

// ── Sync helpers ──
function setMin(val) {
  val = Math.max(0, Math.min(parseInt(sliderMax.value), val || 0));
  sliderMin.value = val;
  numMin.value    = val;
  update();
}
function setMax(val) {
  val = Math.max(parseInt(sliderMin.value), Math.min(MAX_RANK, val || 0));
  sliderMax.value = val;
  numMax.value    = val;
  update();
}

// Slider events
sliderMin.addEventListener('input', () => setMin(parseInt(sliderMin.value)));
sliderMax.addEventListener('input', () => setMax(parseInt(sliderMax.value)));

// Number input events
numMin.addEventListener('change',  () => setMin(parseInt(numMin.value)));
numMax.addEventListener('change',  () => setMax(parseInt(numMax.value)));
numMin.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); setMin(parseInt(numMin.value)); } });
numMax.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); setMax(parseInt(numMax.value)); } });

// Color toggle
colorToggle.addEventListener('change', () => {
  document.body.classList.toggle('plain-mode', !colorToggle.checked);
});

// Chapter change
chapterSelect.addEventListener('change', () => {
  currentChapter = parseInt(chapterSelect.value);
  renderChapter();
});

// ── Init ──
loadData();
</script>

</body>
