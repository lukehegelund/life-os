<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling Tests — Life OS</title>
<link rel="stylesheet" href="css/main.css?v=2">
<style>

/* ── Page Layout ─────────────────────────────────────────── */
.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--gray-400);
  margin-bottom: 8px;
}

/* ── Slider Controls ─────────────────────────────────────── */
.controls-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 18px 20px;
  margin-bottom: 12px;
}

.slider-group {
  margin-bottom: 20px;
}
.slider-group:last-of-type {
  margin-bottom: 0;
}

.slider-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.slider-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-800);
}
.slider-value-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 99px;
  background: var(--blue-light);
  color: var(--blue);
  min-width: 60px;
  text-align: center;
}

.slider-track {
  position: relative;
  padding: 4px 0;
}
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 99px;
  background: var(--gray-200);
  outline: none;
  cursor: pointer;
  transition: background 0.2s;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--blue);
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(37,99,235,0.3);
  transition: transform 0.1s;
}
input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.15);
}
input[type="range"]::-moz-range-thumb {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--blue);
  cursor: pointer;
  border: none;
  box-shadow: 0 1px 4px rgba(37,99,235,0.3);
}

/* tick labels under slider */
.slider-ticks {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
}
.slider-tick {
  font-size: 10px;
  color: var(--gray-400);
  text-align: center;
  flex: 1;
}
.slider-tick:first-child { text-align: left; }
.slider-tick:last-child  { text-align: right; }

/* ── Word Preview ─────────────────────────────────────────── */
.word-preview-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px 18px;
  margin-bottom: 12px;
}
.word-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
  min-height: 28px;
}
.word-pill {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 99px;
  border: 1.5px solid var(--gray-200);
  color: var(--gray-600);
  background: var(--gray-50);
}
.word-pill.easy   { border-color: #86efac; color: #166534; background: #f0fdf4; }
.word-pill.medium { border-color: #fcd34d; color: #92400e; background: #fffbeb; }
.word-pill.hard   { border-color: #fca5a5; color: #991b1b; background: #fef2f2; }
.word-pill.vhard  { border-color: #c4b5fd; color: #5b21b6; background: #f5f3ff; }

/* ── Generate Button ─────────────────────────────────────── */
.generate-btn {
  width: 100%;
  padding: 15px;
  background: var(--blue);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.15s, opacity 0.15s;
  margin-bottom: 16px;
  box-shadow: var(--shadow-md);
}
.generate-btn:hover   { background: #1d4ed8; }
.generate-btn:active  { opacity: 0.88; }
.generate-btn:disabled { background: var(--gray-400); cursor: not-allowed; }

/* spinner inside button */
.btn-spinner {
  width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.btn-spinner.active { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Result Card ─────────────────────────────────────────── */
.result-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 12px;
  display: none;
}
.result-card.visible { display: block; }

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.result-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--gray-800);
}
.result-actions {
  display: flex;
  gap: 8px;
}
.icon-btn {
  background: var(--gray-100);
  border: none;
  border-radius: 8px;
  padding: 7px 11px;
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-600);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background 0.12s;
}
.icon-btn:hover { background: var(--gray-200); }
.icon-btn.copied { background: #d1fae5; color: #166534; }

.sentence-display {
  font-size: 17px;
  line-height: 1.7;
  color: var(--gray-800);
  font-family: Georgia, serif;
  border-left: 3px solid var(--blue);
  padding: 10px 14px;
  background: var(--gray-50);
  border-radius: 0 8px 8px 0;
  margin-bottom: 16px;
}

/* highlighted words in the sentence */
.highlight-word {
  background: var(--blue-light);
  color: var(--blue);
  padding: 0 2px;
  border-radius: 3px;
  font-weight: 600;
}

/* ── Definitions List ─────────────────────────────────────── */
.definitions-section {
  margin-top: 4px;
}
.definitions-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--gray-400);
  margin-bottom: 10px;
}
.definition-item {
  display: flex;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--gray-100);
  align-items: flex-start;
}
.definition-item:last-child { border-bottom: none; }
.def-word {
  font-size: 14px;
  font-weight: 700;
  color: var(--blue);
  min-width: 130px;
  flex-shrink: 0;
}
.def-text {
  font-size: 14px;
  color: var(--gray-600);
  line-height: 1.45;
}

/* ── History ─────────────────────────────────────────────── */
.history-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px 18px;
  margin-bottom: 12px;
}
.history-list {
  margin-top: 8px;
}
.history-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--gray-100);
  cursor: pointer;
  transition: background 0.1s;
}
.history-item:last-child { border-bottom: none; }
.history-item:hover { background: var(--gray-50); }
.history-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--gray-400);
  margin-bottom: 3px;
}
.history-preview {
  font-size: 13px;
  color: var(--gray-600);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Error / Info Messages ───────────────────────────────── */
.error-msg {
  background: #fef2f2;
  border: 1.5px solid #fca5a5;
  color: #991b1b;
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13px;
  margin-bottom: 12px;
  display: none;
}
.error-msg.visible { display: block; }

/* empty history */
.empty-state {
  font-size: 13px;
  color: var(--gray-400);
  padding: 6px 0 4px;
  font-style: italic;
}
</style>
</head>

  <div class="header-row">
    <div>
      <h1>✏️ Spelling Tests</h1>
      <div class="subtitle">Tier 2 Word Generator</div>
    </div>

  <div class="controls-card">

    <!-- Difficulty Slider -->
    <div class="slider-group">
      <div class="slider-header">
        <div class="slider-label">📊 Difficulty</div>
        <div class="slider-value-badge" id="diff-badge">Beginner</div>
      </div>
      <div class="slider-track">
        <input type="range" id="difficulty-slider" min="1" max="5" value="2">
      </div>
      <div class="slider-ticks">
        <span class="slider-tick">Easiest</span>
        <span class="slider-tick">Easy</span>
        <span class="slider-tick">Medium</span>
        <span class="slider-tick">Hard</span>
        <span class="slider-tick">Hardest</span>
      </div>
    </div>

    <!-- Length Slider -->
    <div class="slider-group">
      <div class="slider-header">
        <div class="slider-label">📏 Length</div>
        <div class="slider-value-badge" id="len-badge">5 words</div>
      </div>
      <div class="slider-track">
        <input type="range" id="length-slider" min="1" max="20" value="5">
      </div>
      <div class="slider-ticks">
        <span class="slider-tick">1</span>
        <span class="slider-tick">5</span>
        <span class="slider-tick">10</span>
        <span class="slider-tick">15</span>
        <span class="slider-tick">20</span>
      </div>
    </div>

  </div>

  <!-- ── Word Preview ── -->
  <div class="word-preview-card">
    <div class="section-label">Words at this difficulty</div>
    <div class="word-pills" id="word-pills">
      <!-- populated by JS -->
    </div>

  <!-- ── Generate Button ── -->
  <button class="generate-btn" id="generate-btn" onclick="generateTest()">
    <div class="btn-spinner" id="btn-spinner"></div>
    <span id="btn-label">✨ Generate Spelling Test</span>
  </button>

  <!-- ── Error ── -->
  <div class="error-msg" id="error-msg"></div>

  <!-- ── Result ── -->
  <div class="result-card" id="result-card">
    <div class="result-header">
      <div class="result-title" id="result-title">Generated Test</div>
      <div class="result-actions">
        <button class="icon-btn" id="copy-btn" onclick="copyResult()">📋 Copy</button>
        <button class="icon-btn" onclick="generateTest()">🔄 Regenerate</button>
      </div>
    </div>

    <div class="sentence-display" id="sentence-display"></div>

    <div class="definitions-section" id="defs-section">
      <div class="definitions-title">Definitions</div>
      <div id="definitions-list"></div>
    </div>
  </div>

  <!-- ── History ── -->
  <div class="history-card" id="history-card">
    <div class="section-label">Recent Tests</div>
    <div class="history-list" id="history-list">
      <div class="empty-state">No tests generated yet</div>
    </div>
  </div>

</main>

<script type="module" src="js/auth-guard.js"></script>
<script>

/* ═══════════════════════════════════════════════════════════
   TIER 2 WORD BANK — 5 difficulty levels
   Each word has: word, definition
═══════════════════════════════════════════════════════════ */
const WORD_BANK = {
  1: [ // Easiest — very familiar academic words
    { w: "explain",   d: "to make something clear by describing it in detail" },
    { w: "describe",  d: "to give details about what something is like" },
    { w: "compare",   d: "to look at two or more things and find similarities or differences" },
    { w: "important", d: "having great meaning, value, or effect" },
    { w: "difficult", d: "not easy; requiring effort or skill" },
    { w: "common",    d: "happening or found often; not rare" },
    { w: "suggest",   d: "to put forward an idea for others to consider" },
    { w: "require",   d: "to need something; to make something necessary" },
    { w: "support",   d: "to help or agree with something; to hold something up" },
    { w: "include",   d: "to have something as part of a whole" },
    { w: "provide",   d: "to give or supply what is needed" },
    { w: "create",    d: "to make something new; to bring something into existence" },
    { w: "produce",   d: "to make or create something" },
    { w: "develop",   d: "to grow or change into something bigger or more advanced" },
    { w: "identify",  d: "to recognize and name who or what something is" },
  ],
  2: [ // Easy — common academic words students encounter regularly
    { w: "analyze",   d: "to study something carefully by breaking it into parts" },
    { w: "contrast",  d: "to show how two things are different from each other" },
    { w: "conclude",  d: "to reach a decision or opinion after thinking carefully" },
    { w: "evidence",  d: "facts or details that help prove something is true" },
    { w: "effective", d: "producing the result that was wanted" },
    { w: "specific",  d: "clearly defined; relating to one particular thing" },
    { w: "accurate",  d: "correct and free from errors" },
    { w: "predict",   d: "to say what you think will happen in the future" },
    { w: "category",  d: "a group of things that share similar features" },
    { w: "structure", d: "the way something is organized or put together" },
    { w: "evaluate",  d: "to judge how good, useful, or successful something is" },
    { w: "argument",  d: "a set of reasons given to support or oppose an idea" },
    { w: "consider",  d: "to think carefully about something before deciding" },
    { w: "determine", d: "to find out or establish something with certainty" },
    { w: "establish", d: "to set up or prove something firmly" },
  ],
  3: [ // Medium — Tier 2 core vocabulary
    { w: "evident",     d: "clearly seen or understood; obvious" },
    { w: "relevant",    d: "closely connected to the subject being discussed" },
    { w: "assumption",  d: "something believed to be true without proof" },
    { w: "perspective", d: "a particular way of thinking about something" },
    { w: "sufficient",  d: "enough for the purpose; as much as needed" },
    { w: "justify",     d: "to give good reasons for an action or decision" },
    { w: "imply",       d: "to suggest something without directly saying it" },
    { w: "significant", d: "important; large enough to have a noticeable effect" },
    { w: "consistent",  d: "always behaving or happening in the same way" },
    { w: "demonstrate", d: "to show or prove something clearly" },
    { w: "interpret",   d: "to explain the meaning of something" },
    { w: "emphasis",    d: "special importance or attention given to something" },
    { w: "principle",   d: "a fundamental truth or rule that guides behavior" },
    { w: "contribute",  d: "to give something (time, ideas, help) to a shared effort" },
    { w: "consequence", d: "a result or effect of an action or condition" },
  ],
  4: [ // Hard — sophisticated academic vocabulary
    { w: "ambiguous",    d: "having more than one possible meaning; unclear" },
    { w: "contradict",   d: "to say or show the opposite of what someone else said" },
    { w: "elaborate",    d: "to add more detail; complex and detailed" },
    { w: "inherent",     d: "existing as a natural or permanent part of something" },
    { w: "subsequent",   d: "coming after or following something else" },
    { w: "prevalent",    d: "common or widespread in a particular area or time" },
    { w: "contemplate",  d: "to think deeply and carefully about something" },
    { w: "perceive",     d: "to notice or understand something through the senses or mind" },
    { w: "acknowledge",  d: "to accept or admit that something is true" },
    { w: "undermine",    d: "to gradually weaken or damage something" },
    { w: "reinforce",    d: "to make something stronger or more effective" },
    { w: "distinction",  d: "a clear difference between two similar things" },
    { w: "skeptical",    d: "doubting that something is true or will work" },
    { w: "fundamental",  d: "forming the most essential part; basic and central" },
    { w: "controversial", d: "causing strong disagreement among people" },
  ],
  5: [ // Hardest — advanced Tier 2 with morphological complexity
    { w: "plausible",     d: "seeming reasonable or probable; believable" },
    { w: "meticulous",    d: "paying very careful attention to every detail" },
    { w: "contentious",   d: "causing or likely to cause disagreement or argument" },
    { w: "comprehensive", d: "covering everything; complete and thorough" },
    { w: "nuanced",       d: "having subtle and complex distinctions" },
    { w: "resilient",     d: "able to recover quickly from difficulties" },
    { w: "exacerbate",    d: "to make a bad situation worse" },
    { w: "corroborate",   d: "to confirm or support with evidence" },
    { w: "unprecedented", d: "never having happened or existed before" },
    { w: "omnipresent",   d: "present everywhere at the same time" },
    { w: "proliferate",   d: "to grow or increase rapidly in number" },
    { w: "disparate",     d: "so different as to be impossible to compare" },
    { w: "ostensibly",    d: "appearing to be true, but not necessarily so" },
    { w: "tangential",    d: "only slightly connected to the main topic" },
    { w: "incongruent",   d: "not fitting or agreeing with something else" },
  ]
};

const DIFF_LABELS = ["", "Beginner", "Easy", "Medium", "Hard", "Advanced"];
const DIFF_COLORS = ["", "easy", "easy", "medium", "hard", "vhard"];

// Current state
let currentDifficulty = 2;
let currentLength = 5;
let history = [];

/* ── Slider Logic ── */
const diffSlider = document.getElementById('difficulty-slider');
const lenSlider  = document.getElementById('length-slider');
const diffBadge  = document.getElementById('diff-badge');
const lenBadge   = document.getElementById('len-badge');

function updateDiffBadge() {
  const v = parseInt(diffSlider.value);
  currentDifficulty = v;
  diffBadge.textContent = DIFF_LABELS[v];
  diffBadge.style.background = v <= 2 ? '#d1fae5' : v === 3 ? '#fef3c7' : v === 4 ? '#fee2e2' : '#ede9fe';
  diffBadge.style.color       = v <= 2 ? '#166534' : v === 3 ? '#92400e' : v === 4 ? '#991b1b' : '#5b21b6';
  renderWordPills();
}

function updateLenBadge() {
  const v = parseInt(lenSlider.value);
  currentLength = v;
  lenBadge.textContent = v === 1 ? '1 word' : `${v} words`;
}

diffSlider.addEventListener('input', updateDiffBadge);
lenSlider.addEventListener('input',  updateLenBadge);

function renderWordPills() {
  const container = document.getElementById('word-pills');
  // Show a blend: 70% from chosen level, 30% from adjacent level
  const words = WORD_BANK[currentDifficulty];
  const colorClass = DIFF_COLORS[currentDifficulty];
  container.innerHTML = words.map(w =>
    `<span class="word-pill ${colorClass}">${w.w}</span>`
  ).join('');
}

// Init
updateDiffBadge();
updateLenBadge();

/* ── Pick Words For Test ── */
function pickWords(count, difficulty) {
  // Blend from the target level and ±1 levels based on difficulty position
  const pool = [...WORD_BANK[difficulty]];
  if (difficulty > 1 && count > 4) {
    pool.push(...WORD_BANK[difficulty - 1].slice(0, 3));
  }
  if (difficulty < 5 && count > 8) {
    pool.push(...WORD_BANK[difficulty + 1].slice(0, 2));
  }
  // Shuffle and pick
  const shuffled = pool.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, Math.min(count, shuffled.length));
}

async function callClaude(words, difficulty, count) {
  const wordList = words.map(w => w.w).join(', ');
  const diffLabel = DIFF_LABELS[difficulty].toLowerCase();

  let format = '';
  if (count === 1) {
    format = 'a single clear, natural sentence';
  } else if (count <= 4) {
    format = '1-2 connected sentences';
  } else if (count <= 9) {
    format = '2-3 connected sentences forming a short paragraph';
  } else if (count <= 14) {
    format = '3-4 sentences forming a clear paragraph';
  } else {
    format = 'a full paragraph of 4-6 sentences';
  }

  const prompt = `You are helping a middle school English teacher create a spelling test sentence for students.

Task: Write ${format} that naturally uses ALL of these ${count} Tier 2 vocabulary words: ${wordList}

Requirements:
- Every word in the list MUST appear in the text, used correctly and naturally
- The text should sound like real, polished English — not forced or awkward
- The vocabulary difficulty is ${diffLabel} level (${difficulty}/5)
- Do NOT use any word from the list more than once
- The sentence(s) should make sense as a coherent whole
- Keep it interesting and engaging for middle schoolers

Return ONLY a JSON object with this exact structure (no extra text, no markdown):
{
  "text": "the generated sentence or paragraph here",
  "words_used": ["word1", "word2", ...]
}`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': CLAUDE_API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 600,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!response.ok) {
    const err = await response.text();
    throw new Error(`API error ${response.status}: ${err}`);
  }

  const data = await response.json();
  const raw = data.content[0].text.trim();

  // Parse JSON — handle code blocks if present
  const jsonStr = raw.replace(/^```json\s*/,'').replace(/```\s*$/,'').trim();
  return JSON.parse(jsonStr);
}

/* ── Highlight Words In Text ── */
function highlightWords(text, words) {
  let result = text;
  // Sort by length descending to avoid partial matches
  const sorted = [...words].sort((a, b) => b.length - a.length);
  for (const word of sorted) {
    const re = new RegExp(`\\b(${word}s?|${word[0].toUpperCase()}${word.slice(1)}s?)\\b`, 'g');
    result = result.replace(re, `<span class="highlight-word">$1</span>`);
  }
  return result;
}

/* ── Main Generate Function ── */
async function generateTest() {
  const btn     = document.getElementById('generate-btn');
  const spinner = document.getElementById('btn-spinner');
  const label   = document.getElementById('btn-label');
  const errEl   = document.getElementById('error-msg');
  const resultCard = document.getElementById('result-card');

  // Reset error
  errEl.classList.remove('visible');

  // Loading state
  btn.disabled = true;
  spinner.classList.add('active');
  label.textContent = 'Generating…';

  try {
    // Ensure key is available (may have been wiped from sessionStorage)
    if (!CLAUDE_API_KEY) await loadClaudeKey();
    if (!CLAUDE_API_KEY) throw new Error('Claude API key unavailable. Please try again.');

    const words = pickWords(currentLength, currentDifficulty);
    const result = await callClaude(words, currentDifficulty, currentLength);

    // Render sentence with highlights
    const wordStrings = words.map(w => w.w);
    const highlighted = highlightWords(result.text, wordStrings);
    document.getElementById('sentence-display').innerHTML = highlighted;

    // Render definitions for the words used
    const defsList = document.getElementById('definitions-list');
    defsList.innerHTML = words.map(w =>
      `<div class="definition-item">
        <div class="def-word">${w.w}</div>
        <div class="def-text">${w.d}</div>
      </div>`
    ).join('');

    // Set result title
    document.getElementById('result-title').textContent =
      `${DIFF_LABELS[currentDifficulty]} · ${currentLength} word${currentLength > 1 ? 's' : ''}`;

    // Show result card
    resultCard.classList.add('visible');

    // Add to history
    addToHistory(result.text, words, currentDifficulty, currentLength);

  } catch (err) {
    console.error(err);
    errEl.textContent = `Error generating test: ${err.message}. Check your connection and try again.`;
    errEl.classList.add('visible');
  } finally {
    btn.disabled = false;
    spinner.classList.remove('active');
    label.textContent = '✨ Generate Spelling Test';
  }
}

/* ── Copy Result ── */
async function copyResult() {
  const btn = document.getElementById('copy-btn');
  const sentence = document.getElementById('sentence-display').innerText;
  const defItems = document.querySelectorAll('.definition-item');
  let text = sentence + '\n\n--- Definitions ---\n';
  defItems.forEach(item => {
    const word = item.querySelector('.def-word').textContent;
    const def  = item.querySelector('.def-text').textContent;
    text += `${word}: ${def}\n`;
  });

  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Copy';
      btn.classList.remove('copied');
    }, 2000);
  } catch {
    btn.textContent = '❌ Failed';
    setTimeout(() => { btn.textContent = '📋 Copy'; }, 2000);
  }
}

/* ── History ── */
function addToHistory(text, words, difficulty, count) {
  const entry = {
    text,
    words: words.map(w => w.w),
    difficulty,
    count,
    ts: Date.now()
  };
  history.unshift(entry);
  if (history.length > 10) history.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!history.length) {
    list.innerHTML = '<div class="empty-state">No tests generated yet</div>';
    return;
  }
  list.innerHTML = history.map((h, i) => {
    const ago = timeAgo(h.ts);
    const preview = h.text.length > 80 ? h.text.slice(0, 80) + '…' : h.text;
    return `<div class="history-item" onclick="loadHistory(${i})">
      <div class="history-meta">
        <span>${DIFF_LABELS[h.difficulty]}</span>
        <span>·</span>
        <span>${h.count} word${h.count > 1 ? 's' : ''}</span>
        <span>·</span>
        <span>${ago}</span>
      </div>
      <div class="history-preview">${preview}</div>
    </div>`;
  }).join('');
}

function loadHistory(index) {
  const h = history[index];
  if (!h) return;

  // Reconstruct word objects from history entry by looking up definitions
  const wordObjs = h.words.map(w => {
    for (const level of Object.values(WORD_BANK)) {
      const found = level.find(entry => entry.w === w);
      if (found) return found;
    }
    return { w, d: '(definition not found)' };
  });

  const highlighted = highlightWords(h.text, h.words);
  document.getElementById('sentence-display').innerHTML = highlighted;

  const defsList = document.getElementById('definitions-list');
  defsList.innerHTML = wordObjs.map(w =>
    `<div class="definition-item">
      <div class="def-word">${w.w}</div>
      <div class="def-text">${w.d}</div>
    </div>`
  ).join('');

  document.getElementById('result-title').textContent =
    `${DIFF_LABELS[h.difficulty]} · ${h.count} word${h.count > 1 ? 's' : ''} (from history)`;

  document.getElementById('result-card').classList.add('visible');
  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1)  return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}
